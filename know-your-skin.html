    <script id="pageData" type="application/json">{"ingredients": {"oily": {"good": [{"n": "Niacinamide (Vitamin B3)", "d": "Multiple peer-reviewed studies show 2% niacinamide reduces sebum excretion rate by up to 82% over 4 weeks. It works by down-regulating the transfer of melanosomes and inhibiting fatty acid synthesis in sebocytes. It also visibly reduces pore size, strengthens the barrier, and reduces redness. Use at 5-10% concentration daily."}, {"n": "Salicylic Acid (BHA)", "d": "The only oil-soluble exfoliant. Because BHA is lipid-soluble, it penetrates through the sebum inside a pore and exfoliates from within, dissolving the keratin plugs causing blackheads. AHAs are water-soluble and stay on the surface. Use at 0.5-2% in a leave-on product 3-4 times per week."}, {"n": "Hyaluronic Acid", "d": "A humectant that binds up to 1,000 times its weight in water, adding zero oil. Oily skin needs hydration just like any other type - the mistake is confusing oil with hydration. Apply on damp skin before moisturiser. Low molecular weight HA penetrates deeper; high molecular weight provides surface hydration."}, {"n": "Zinc PCA", "d": "Zinc inhibits 5-alpha reductase, the enzyme that converts testosterone to DHT - the androgen most responsible for sebaceous gland stimulation. PCA helps deliver zinc into the skin. Found in many toners. Also has antimicrobial properties against C. acnes bacteria."}, {"n": "Azelaic Acid", "d": "Dual-action for oily skin: normalises keratinisation to prevent follicle blockage, and kills C. acnes bacteria. At 10% it is effective OTC; 15-20% is prescription strength. Also reduces post-acne redness and hyperpigmentation. Safe during pregnancy unlike many other actives."}, {"n": "Kaolin and Bentonite Clay", "d": "Clay minerals physically adsorb excess sebum and impurities through electrical charge attraction. Kaolin is gentler; bentonite is more absorbent. Best used in masks 1-2 times per week rather than daily. Studies show they reduce shine for up to 8 hours post-application."}], "bad": [{"n": "Coconut Oil (face)", "d": "Predominantly lauric acid (C12), comedogenic rating 4/5. Despite marketing as a natural hero, coconut oil is one of the most reliably pore-clogging ingredients for facial skin. Community surveys consistently show breakouts within 1-2 weeks of facial use. Fine for body and hair - not for leave-on facial use on oily skin."}, {"n": "Alcohol Denat", "d": "Short-term effect: strips all surface oil, temporarily mattifying. Long-term: damages the stratum corneum, disrupts the acid mantle (pH 4.5-5.5), kills beneficial bacteria, and triggers rebound sebum production. If alcohol denat or ethanol appears in the first 5 ingredients of a toner, avoid it."}, {"n": "Shea Butter (face)", "d": "Stearic acid dominant, rated 2-3/5 comedogenically. Excellent for dry body skin but too heavy for oily facial skin. Will congest pores, particularly in warm humid climates."}, {"n": "Isopropyl Myristate", "d": "Comedogenic rating 5/5. Often used in makeup and sunscreens as a texture enhancer. Penetrates pores readily and triggers comedones. Check ingredient lists of primers, foundations, and body lotions."}], "caution": [{"n": "Argan Oil", "d": "Oleic acid dominant, moderate comedogenic risk. Rated 0-1 by some sources, higher by others. Individual variation is genuine. Patch test on the jawline for one week before full face use."}, {"n": "Dimethicone", "d": "Not comedogenic itself, but forms a physical barrier that can feel occluding when layered over many products. Double cleansing once daily resolves any buildup."}]}, "dry": {"good": [{"n": "Hyaluronic Acid", "d": "Draws water from the dermis and environment into the epidermis. Critical note: always apply on damp skin. In low-humidity environments, HA applied to dry skin can draw moisture out and worsen dryness - it needs a water source. Look for products with multiple molecular weights for surface and deeper hydration."}, {"n": "Glycerin", "d": "The most studied moisturising ingredient in dermatology with decades of clinical evidence. A small humectant molecule that penetrates skin easily and maintains water balance in the stratum corneum. Also has emollient properties that help repair barrier lipids. Found in every well-formulated moisturiser. Completely non-comedogenic."}, {"n": "Ceramides (NP, AP, EOP)", "d": "Ceramides are the main structural lipid of the stratum corneum - they make up approximately 50% of the intercellular lipid matrix, the mortar between skin cells. In dry skin, ceramide levels are measurably depleted. Topical ceramide creams restore barrier function, reduce TEWL, and relieve dry and eczema-prone skin. CeraVe was built around this science."}, {"n": "Squalane", "d": "A hydrogenated, stable form of squalene - a lipid naturally produced by sebaceous glands. Lightweight emollient with a comedogenic rating of 1. Biomimetic (mimics skin's own lipids), so it integrates into the barrier effectively. Non-greasy. Particularly valuable for dry skin as a lightweight final-step oil."}, {"n": "Shea Butter", "d": "Rich in stearic and oleic fatty acids. Functions as both an emollient (softens) and an occlusive (reduces water evaporation). Contains triterpenes with mild anti-inflammatory properties. Best applied as the final PM step over other hydrating products to seal everything in overnight."}, {"n": "Lactic Acid (AHA)", "d": "Water-soluble exfoliant that removes dead cell buildup causing rough texture and dullness. Gentler than glycolic acid due to its larger molecular size. Also has humectant properties - unique among AHAs. Start at 5% two to three times per week. Always follow with moisturiser and use SPF the next morning."}], "bad": [{"n": "Alcohol Denat", "d": "Strips the limited natural oil dry skin produces and dissolves the lipids in the stratum corneum. Creates a vicious cycle: strips barrier, TEWL increases, skin feels tighter, more dryness. Particularly harmful in toners applied to the full face and left on."}, {"n": "Sodium Lauryl Sulfate (SLS)", "d": "Well-documented to irritate the skin barrier at concentrations as low as 0.5%. Particularly problematic for dry skin because it removes cholesterol from intercellular lipids - a component the barrier cannot replace quickly. Switch to cream, oil, or micellar cleansers."}, {"n": "Fragrance in leave-on products", "d": "Dry skin has a compromised, more permeable barrier. Fragrance molecules are among the most common contact allergens and include dozens of individual chemical compounds. In leave-on serums and moisturisers, fragrance has prolonged contact with compromised skin and significantly increases sensitisation risk."}], "caution": [{"n": "Glycolic Acid", "d": "The smallest AHA molecule - penetrates most deeply and most powerfully. Effective for texture but requires careful introduction. Start at 5% maximum, once per week, followed immediately by a ceramide-rich moisturiser. Lactic acid achieves similar exfoliation with less irritation risk."}, {"n": "Retinol", "d": "Invaluable long-term but requires a slow introduction for dry skin. Begin at 0.025% or 0.05%, once per week, sandwiched between two layers of moisturiser: moisturise, apply retinol, moisturise again. The initial 4-8 weeks of dryness (retinisation) can be minimised this way."}]}, "combination": {"good": [{"n": "Niacinamide", "d": "The single most useful ingredient for combination skin because it addresses both zones simultaneously. In the T-zone: reduces sebum production by up to 82% in studies. In drier zones: strengthens the barrier and improves moisture retention. Use daily at 5-10% across the whole face."}, {"n": "Azelaic Acid", "d": "pH-dependent action makes it effective across all skin zones without requiring zone targeting. Normalises follicular keratinisation, reduces hyperpigmentation, and is anti-inflammatory. Suitable for the full face at 10% OTC."}, {"n": "Hyaluronic Acid", "d": "Water-based humectant appropriate for all zones. Adds no oil, so it hydrates drier cheeks without contributing to T-zone shine. A lightweight HA serum applied to the full face before moisturiser works perfectly."}, {"n": "Gel or gel-cream moisturisers", "d": "Texture matters enormously for combination skin. Gel formulas contain mostly water and glycerin with minimal occlusives - they hydrate dry zones adequately while being light enough not to congest oily zones. Apply gel to the T-zone and slightly richer cream to cheeks if needed."}], "bad": [{"n": "Rich cream across the full face", "d": "Fatty, occlusive creams hydrate cheeks but congest the T-zone. The sebaceous follicles in the forehead and nose area are particularly susceptible to pore blockage from heavy emollients."}, {"n": "Coconut Oil", "d": "The most comedogenic oil regularly marketed to consumers. Even applied only to cheeks, oils migrate across the face during sleep. Not appropriate for any zone of combination skin."}], "caution": [{"n": "Strong AHAs across the full face", "d": "Glycolic acid applied uniformly can over-exfoliate drier cheek areas. Apply targeted BHA (salicylic acid) to the T-zone only, 3-4 times per week. Use a gentler or no exfoliant on cheeks."}, {"n": "Highly acidic Vitamin C serums", "d": "L-ascorbic acid formulas at pH 2.5-3.5 can irritate dry or sensitive cheek areas. Sodium ascorbyl phosphate and ascorbyl glucoside forms work at neutral pH and are better tolerated across all zones."}]}, "sensitive": {"good": [{"n": "Centella Asiatica (Cica)", "d": "Contains four key actives: asiaticoside, madecassoside, asiatic acid, and madecassic acid. Together they stimulate collagen synthesis, reduce inflammation via NF-kB pathway inhibition, accelerate wound healing, and strengthen the skin barrier. Multiple randomised controlled trials confirm efficacy. One of the most consistently well-tolerated actives with virtually no reported sensitisation."}, {"n": "Ceramides", "d": "Rebuilds the compromised lipid barrier. In sensitive skin, barrier disruption is often the root cause of reactivity. Ceramide NP, AP, and EOP together with cholesterol and fatty acids in approximately 1:1:1 ratio is the formula used in CeraVe and is backed by significant clinical research."}, {"n": "Panthenol (Pro-Vitamin B5)", "d": "Converts to pantothenic acid in skin, where it participates in metabolic processes essential for cell renewal and barrier repair. Has humectant properties and calms irritation. Frequently included in formulas alongside stronger actives to buffer their irritancy. Well tolerated even by eczema-prone skin."}, {"n": "Azelaic Acid 10%", "d": "One of very few actives with a safety profile strong enough for rosacea, perioral dermatitis, and reactive skin. Anti-inflammatory, antimicrobial, and normalises cell turnover without the irritancy of acids or retinoids. Available OTC at 10%; prescription at 15-20%."}, {"n": "Allantoin", "d": "A keratolytic and anti-irritant found naturally in comfrey root. Added to formulas to reduce irritation from stronger active ingredients and promote healing. Stimulates new tissue growth and acts as a buffer against pH-sensitive reactions."}], "bad": [{"n": "Fragrance / Parfum (all forms)", "d": "Fragrance is listed as a single ingredient but represents hundreds of individual chemical compounds, many of which are known allergens. The American Contact Dermatitis Society repeatedly names fragrance mix as a top contact allergen. Natural fragrance and essential oil fragrance are not safer - citrus, lavender, and rose contain potent sensitisers. Every leave-on product for sensitive skin should be fragrance-free."}, {"n": "Essential Oils in leave-on products", "d": "Sensitising compounds in essential oils - limonene (citrus), linalool (lavender), eugenol (clove) - are well-documented contact allergens. With repeated exposure, the immune system develops a memory response and subsequent applications trigger increasingly severe reactions. Once sensitised, even trace amounts cause reactions. This sensitisation process is irreversible."}, {"n": "Alcohol Denat", "d": "Particularly problematic for sensitive skin. Beyond the barrier disruption common to all skin types, compromised sensitive skin has reduced capacity to repair, making each exposure cumulatively more damaging."}, {"n": "Physical exfoliation (scrubs, brushes)", "d": "Mechanical friction on sensitive skin causes microabrasions, disrupts the stratum corneum, and triggers inflammatory responses that worsen sensitivity over time. Chemical exfoliation starting at very low concentrations is dramatically less traumatic than physical scrubbing."}], "caution": [{"n": "Niacinamide above 10%", "d": "Generally excellent for sensitive skin. However, at concentrations above 10%, some individuals experience niacin flush - temporary redness caused by free niacin conversion. Start at 5%, confirm tolerability, then progress to 10%. Products above 10% are rarely necessary."}, {"n": "Vitamin C (L-ascorbic acid form)", "d": "L-ascorbic acid requires pH 2.5-3.5 for stability - this acidity stings sensitive skin. Alternatives: sodium ascorbyl phosphate, ascorbyl glucoside, magnesium ascorbyl phosphate. These work at neutral pH, are significantly better tolerated, and still provide antioxidant and brightening benefits."}]}, "normal": {"good": [{"n": "Vitamin C (L-ascorbic acid or derivatives)", "d": "Essential for collagen synthesis - it is a required cofactor for prolyl hydroxylase, the enzyme that stabilises collagen triple helices. Also inhibits tyrosinase to prevent UV-induced pigmentation and scavenges free radicals from UV and pollution. Apply in the morning before SPF. Store in dark, airtight packaging as it oxidises rapidly."}, {"n": "Retinol / Retinoids", "d": "The most evidence-backed anti-aging ingredient category in dermatology. Retinoids bind to nuclear retinoic acid receptors and upregulate genes involved in collagen synthesis, skin cell turnover, and hyaluronic acid production. They reverse UV-induced changes at a cellular level. Retinol OTC converts to retinoic acid at low efficiency; tretinoin prescription is retinoic acid directly. Start at 0.025-0.05%, apply at night 1-3 times per week, increase frequency over 3 months."}, {"n": "SPF 30-50 (daily, without exception)", "d": "UV exposure accounts for approximately 80% of visible facial aging in lifetime studies. UVA rays degrade collagen and elastin via reactive oxygen species. UVB rays cause direct DNA damage. Both contribute to skin cancer. Broad-spectrum SPF applied daily is the single intervention with the strongest evidence for preventing photoaging. No serum or supplement comes close."}, {"n": "Peptides", "d": "Short amino acid chains that signal skin cells to perform specific functions. Matrixyl stimulates fibroblasts to produce collagen and fibronectin. Argireline inhibits neurotransmitter release at the muscular junction to reduce expression lines. Copper peptides promote wound healing. Results require 8-12 weeks of consistent use with no irritancy."}, {"n": "Hyaluronic Acid", "d": "Maintains baseline hydration regardless of skin type. Normal skin benefits from topical HA as a lightweight daily hydrator that keeps skin plump and reduces fine line appearance through mechanical water-binding."}], "bad": [{"n": "Over-exfoliating", "d": "Using an AHA, a BHA, and a retinoid in the same routine reliably damages even normal skin barriers. Skin cycling (alternating actives with recovery nights) exists because the skincare community created the problem of over-exfoliation and needed a solution. Two nights of exfoliation and two nights of barrier repair per week is the recommended framework."}, {"n": "Skipping SPF daily", "d": "UV damage is cumulative from the first exposure. People with darker skin have more photoprotective melanin, but melanin does not prevent UV-induced DNA damage - it only reduces visible burning rate. Starting SPF early is the single highest-return skincare investment available."}], "caution": [{"n": "Fragrance in leave-on products long-term", "d": "Normal skin is more tolerant of fragrance, but sensitisation is cumulative. Repeated exposure over years can develop contact allergies in people who previously showed no reaction. Choosing fragrance-free formulas in daily products reduces this long-term risk."}]}}, "acneTypes": [{"name": "Blackheads", "emoji": "🟢", "severityColor": "#e8f5e9", "severity": "mild", "what": "Open comedones — pores clogged with oxidised sebum and dead skin cells. The dark colour is not dirt. It is sebum that has been exposed to air and oxidised, turning dark brown or black. Common on the nose, chin, and forehead. They can persist for months without targeted treatment and gradually stretch the pore over time.", "cause": "Excess sebum mixes with dead skin cells and blocks the pore opening. Because the pore stays open, the top layer oxidises on contact with air. Hormonal changes — including the natural androgen fluctuations of the menstrual cycle — humid climates, occlusive skincare, and certain pore-clogging products worsen them. People with large visible pores are structurally more prone due to higher sebum output from larger follicles.", "treat": "Salicylic acid (BHA) 0.5-2% used consistently is the most effective treatment. Oil-soluble, it penetrates inside the pore to dissolve the blockage from within. Retinol speeds up cell turnover to prevent new ones forming by stopping the follicle from clogging in the first place. Niacinamide reduces the sebum that feeds them. Pore strips only remove the oxidised tip temporarily — the root sebaceous filament stays in place and reforms within days. Do not use physical scrubs, which spread bacteria and cause micro-tears without addressing the underlying cause.", "time": "4-8 weeks of consistent BHA use for visible improvement. Full clearance typically 3-4 months."}, {"name": "Whiteheads", "emoji": "🟢", "severityColor": "#e8f5e9", "severity": "mild", "what": "Closed comedones — the pore is completely sealed by a thin layer of skin trapping sebum and dead cells underneath. No air exposure, so the sebum stays white or flesh-coloured. Common on the chin, forehead, and around the nose. They can be flat and barely visible or raised into small bumps. A cluster of whiteheads in the same area often points to a specific product causing the issue.", "cause": "Same mechanism as blackheads but the pore opening is blocked at the surface by a thin layer of skin. Very commonly triggered by specific products — certain moisturisers, sunscreens, foundations, and makeup primers contain ingredients that seal the pore opening. This type of acne is called acne cosmetica and is entirely product-induced. Hormonal fluctuations also play a role, particularly around the chin and jaw area.", "treat": "Gentle chemical exfoliants remove the skin layer sealing the pore: AHAs like lactic acid loosen the bonds between dead cells at the surface, BHAs like salicylic acid work inside the pore. Retinoids are particularly effective as they normalise the entire skin cell cycle, preventing pores from ever sealing over in the first place. If a cluster appeared after starting a new product, that product is the most likely culprit — stop it for 4 weeks and observe. Do not try to pop or scratch whiteheads with fingernails or tools, which guarantees post-inflammatory marks.", "time": "6-12 weeks of consistent exfoliant and retinoid use for significant clearance."}, {"name": "Papules", "emoji": "🟡", "severityColor": "#fff9c4", "severity": "moderate", "what": "Small, raised, red or pink bumps with no visible pus. They form when a clogged pore becomes infected with C. acnes bacteria and surrounding tissue becomes inflamed. Tender and warm to touch. They look like small red raised bumps with no white top. Often tender when pressed. Can cluster in groups, particularly along the jawline or across the forehead during hormonal fluctuations.", "cause": "Bacterial infection of a blocked follicle triggers an immune response. C. acnes bacteria — which naturally lives in skin follicles and feeds on sebum — proliferates rapidly when sebum levels are high. White blood cells rush in to fight the bacteria, causing the characteristic redness, warmth, and tenderness. This is the immune system doing its job. The inflammation is contained to the epidermis at this stage — it has not yet broken through into the dermis. This is important because it means post-inflammatory scarring risk is still relatively low.", "treat": "Benzoyl peroxide (2.5-5%) is one of the most effective topical treatments — it kills C. acnes bacteria through oxidation and does not cause antibiotic resistance unlike topical antibiotics. Niacinamide reduces the inflammatory response. Azelaic acid kills bacteria and reduces redness simultaneously. Do not squeeze papules — they have no pus to extract and squeezing pushes bacteria sideways into adjacent follicles, creating new breakouts, while the pressure drives bacteria deeper into the dermis. This is how a manageable papule becomes a nodule.", "time": "5-7 days for an individual papule to resolve with treatment. Without treatment, 10-14 days."}, {"name": "Pustules", "emoji": "🟡", "severityColor": "#fff9c4", "severity": "moderate", "what": "The classic pimple — a red, inflamed base with a visible white or yellow tip filled with pus (dead white blood cells, bacteria, and sebum). They sit at or near the skin surface and feel soft when pressed. More advanced than papules. The white tip means the immune response has produced enough pus to be visible. Very common during hormonal fluctuations, particularly the week before menstruation.", "cause": "More advanced inflammation than a papule. The immune response has produced pus as the body tries to isolate and destroy the bacterial infection. The follicle wall becomes stretched and weakened by the accumulated debris. Very common during hormonal fluctuations because androgen spikes increase sebum, increasing the food supply for C. acnes bacteria. Stress-triggered cortisol has the same effect. Certain dietary factors — particularly high-glycaemic foods and dairy — have been shown in studies to worsen pustular acne in susceptible individuals by raising insulin-like growth factor 1 (IGF-1), which stimulates sebum production.", "treat": "Spot treatments with benzoyl peroxide 2.5-5% kill bacteria effectively without the antibiotic resistance risk of topical antibiotics. Sulfur draws out pus and has antimicrobial properties. Salicylic acid dissolves the sebum plug. If the pustule has a visible white head and appears to be at the surface, a warm compress held against it for 10 minutes can encourage natural resolution. If you do extract, use a sterile comedone extractor tool with very gentle pressure only if the white head is directly at the surface — never use fingernails. Popping with fingernails spreads bacteria and guarantees post-inflammatory hyperpigmentation.", "time": "5-10 days for an individual pustule to resolve with treatment."}, {"name": "Nodules", "emoji": "🔴", "severityColor": "#ffebee", "severity": "severe", "what": "Large, hard, deeply embedded lumps under the skin with no visible head. Often 1-2 centimetres wide and extremely tender or painful to touch. They do not come to a head and cannot be extracted from the surface because the blockage is too deep in the dermis. They can persist for weeks or months without treatment. Each nodule that persists significantly raises the risk of permanent scarring — the deep inflammation breaks down collagen in the surrounding tissue.", "cause": "Developed when the follicle wall ruptures deep in the dermis, spilling bacteria and sebum into the surrounding tissue. This triggers a severe immune response that extends far beyond the original follicle. The resulting inflammation is deep, hard, and widespread. Often strongly genetic — if parents had nodular acne, the likelihood is significantly higher. Hormonal drivers are particularly strong: testosterone, DHT, and IGF-1 all contribute. Certain medications including some steroids, lithium, and androgens in contraceptives can trigger or worsen nodular acne.", "treat": "Over-the-counter products cannot reach the depth of a nodule. A dermatologist can prescribe oral antibiotics (doxycycline, lymecycline) to reduce bacterial load systemically, hormonal therapy in those with identified hormonal drivers, or topical tretinoin for longer-term normalisation of cell turnover. In-office cortisone injections (intralesional corticosteroids) can reduce a nodule within 24-48 hours — genuinely one of the most effective acute treatments available. Never attempt to squeeze or apply pressure to nodules. The pressure ruptures the follicle wall further and dramatically worsens both the nodule and the likelihood of scarring.", "time": "Weeks to months without treatment. 24-72 hours with in-office cortisone injection."}, {"name": "Cystic Acne", "emoji": "🔴", "severityColor": "#ffebee", "severity": "severe", "what": "The most severe form of acne. Large, fluid-filled, painful sacs deep in the skin. They feel soft and fluctuant when pressed — different from the hard firmness of nodules. Most likely type to leave permanent, irreversible scarring. Often appears on the jaw, cheeks, and back but can occur anywhere with sebaceous follicles. Each untreated cyst actively destroys collagen in the surrounding dermis while it is inflamed.", "cause": "Same deep follicular rupture as nodules but with a larger fluid component and a more extensive inflammatory response. Strongly genetic — if a close family member had cystic acne, your risk is significantly elevated. Often hormonal: particularly common in people with PCOS (polycystic ovary syndrome), during hormonal fluctuations, with androgen-heavy contraceptives, or during puberty. The sebaceous glands in people with cystic-prone skin appear to respond more aggressively to androgen stimulation than in those without this tendency.", "treat": "Cystic acne requires a dermatologist. Isotretinoin (sold as Accutane, Roaccutane, and various generics) is the most effective treatment available and the only one that can permanently clear cystic acne by shrinking the sebaceous glands. A typical course is 4-6 months. It requires monitoring blood lipids and liver enzymes and has a strict pregnancy prevention protocol due to its teratogenic effects. Hormonal therapies (combined oral contraceptives, spironolactone) address the androgen driver and are highly effective for those with hormonal patterns. Never attempt to squeeze or drain cysts at home under any circumstances — this guarantees permanent scarring.", "time": "Isotretinoin course typically 4-6 months. Hormonal therapy improvement typically 3-6 months."}], "quizzes": [{"id": "skintype", "title": "What Is Your Skin Type?", "desc": "5 honest questions to identify your skin type and compare it to your saved profile.", "questions": [{"q": "A few hours after washing with no products, how does your skin feel?", "opts": [{"l": "Shiny and oily all over", "s": {"oily": 3}}, {"l": "Tight and a little flaky", "s": {"dry": 3}}, {"l": "Oily in the middle, dry on the cheeks", "s": {"combination": 3}}, {"l": "Comfortable, neither oily nor dry", "s": {"normal": 3}}]}, {"q": "How do your pores look around your nose and forehead?", "opts": [{"l": "Visibly large and obvious", "s": {"oily": 2, "combination": 1}}, {"l": "Barely visible", "s": {"dry": 2, "normal": 2}}, {"l": "Large on nose, fine on cheeks", "s": {"combination": 3}}, {"l": "I cannot really tell", "s": {"normal": 1, "sensitive": 1}}]}, {"q": "How does your skin typically react to new skincare products?", "opts": [{"l": "Often breaks out or gets oilier", "s": {"oily": 2}}, {"l": "Feels dry or uncomfortable", "s": {"dry": 2}}, {"l": "Redness, stinging, or irritation", "s": {"sensitive": 3}}, {"l": "Generally fine with most products", "s": {"normal": 3, "combination": 1}}]}, {"q": "By the end of the day, what does your skin look like?", "opts": [{"l": "Very shiny all over", "s": {"oily": 3}}, {"l": "Dull, tight, or flaky", "s": {"dry": 3}}, {"l": "Shiny in the middle, normal elsewhere", "s": {"combination": 3}}, {"l": "Much the same as the morning", "s": {"normal": 3}}]}, {"q": "How often do you get breakouts?", "opts": [{"l": "Regularly, especially forehead and nose", "s": {"oily": 2, "combination": 1}}, {"l": "Rarely, my skin is usually clear", "s": {"dry": 1, "normal": 2}}, {"l": "After using the wrong products", "s": {"sensitive": 2}}, {"l": "Occasionally but not a major concern", "s": {"combination": 1, "normal": 1}}]}]}, {"id": "barrier", "title": "How Healthy Is Your Skin Barrier?", "desc": "Find out if your skin barrier is compromised and what it means for your routine.", "questions": [{"q": "How does your skin feel after using a new cleanser for the first time?", "opts": [{"l": "Tight and squeaky clean (like it should be)", "s": {"damaged": 3}}, {"l": "Comfortable, just clean", "s": {"healthy": 3}}, {"l": "Sometimes fine, sometimes reactive", "s": {"compromised": 3}}, {"l": "Slightly dry but nothing major", "s": {"compromised": 2}}]}, {"q": "Do you regularly experience redness that takes a long time to fade?", "opts": [{"l": "Yes, often after products or temperature changes", "s": {"damaged": 3}}, {"l": "Occasionally but it passes quickly", "s": {"compromised": 2}}, {"l": "Rarely or never", "s": {"healthy": 3}}, {"l": "Only in very specific situations like sun exposure", "s": {"healthy": 2}}]}, {"q": "How does your skin react to fragranced products?", "opts": [{"l": "Burns, stings, or turns red reliably", "s": {"damaged": 3}}, {"l": "Sometimes I notice irritation", "s": {"compromised": 2}}, {"l": "No reaction at all", "s": {"healthy": 3}}, {"l": "Only heavy perfumed products bother me", "s": {"compromised": 1}}]}, {"q": "How would you describe your skin texture in winter or dry environments?", "opts": [{"l": "Tight, flaky, and visibly rough", "s": {"damaged": 3}}, {"l": "A bit drier than usual but manageable", "s": {"compromised": 2}}, {"l": "No real change", "s": {"healthy": 3}}, {"l": "Slightly uncomfortable but not severe", "s": {"compromised": 1}}]}]}, {"id": "ingredients", "title": "Do You Know Your Ingredients?", "desc": "Test your knowledge of skincare ingredient science. No googling allowed.", "questions": [{"q": "Why is salicylic acid (BHA) better than glycolic acid (AHA) for blackheads?", "opts": [{"l": "It is stronger and works faster", "s": {"correct": 0}}, {"l": "It is oil-soluble so it can penetrate inside oily pores", "s": {"correct": 3}}, {"l": "It is a natural ingredient", "s": {"correct": 0}}, {"l": "It is less irritating than AHAs", "s": {"correct": 0}}]}, {"q": "What does the comedogenic scale measure?", "opts": [{"l": "How quickly a product absorbs", "s": {"correct": 0}}, {"l": "How likely an ingredient is to clog pores (0 = safe, 5 = very likely to clog)", "s": {"correct": 3}}, {"l": "How effective an ingredient is", "s": {"correct": 0}}, {"l": "How natural an ingredient is", "s": {"correct": 0}}]}, {"q": "Retinol, retinal, and tretinoin are all in the same family. Which is strongest?", "opts": [{"l": "Retinol", "s": {"correct": 0}}, {"l": "Retinal", "s": {"correct": 0}}, {"l": "Tretinoin", "s": {"correct": 3}}, {"l": "They are all the same strength", "s": {"correct": 0}}]}, {"q": "What is TEWL and why does it matter for dry skin?", "opts": [{"l": "A type of exfoliant used for texture", "s": {"correct": 0}}, {"l": "Transepidermal Water Loss - how much water evaporates from your skin surface", "s": {"correct": 3}}, {"l": "The oil level in your skin", "s": {"correct": 0}}, {"l": "A measure of skin pH", "s": {"correct": 0}}]}, {"q": "Why should you apply Hyaluronic Acid on DAMP skin?", "opts": [{"l": "It is absorbed faster when wet", "s": {"correct": 0}}, {"l": "HA is a humectant and needs a water source to draw from - on dry skin it can pull moisture OUT", "s": {"correct": 3}}, {"l": "It stings on dry skin", "s": {"correct": 0}}, {"l": "Damp skin opens pores better", "s": {"correct": 0}}]}]}]}</script>

</head>

    { id:"quiz",         label:"Interactive", title:"Skin Quizzes — 3 to Try",       icon:"✏️", wide:true, isQuiz:true },
];

// ══════════════════════════════════════════════════════════
// BUILD HUB
// ══════════════════════════════════════════════════════════
function buildHub() {
    const skin = userProfile?.skinType || "normal";
    const info = SKIN_INFO[skin] || SKIN_INFO.normal;

    document.getElementById("profileEmoji").textContent = info.emoji;
    document.getElementById("profileTitle").textContent = info.label + " Guide";
    document.getElementById("profileDesc").textContent  = info.desc;

    const tagsEl = document.getElementById("profileTags");
    tagsEl.innerHTML = "";
    addTag(tagsEl, info.label);
    if (userProfile?.ageRange) {
        const m = { teen:"Teenager", "young-adult":"Young Adult", adult:"Adult", mature:"Mature" };
        addTag(tagsEl, m[userProfile.ageRange] || userProfile.ageRange);
    }
    (userProfile?.concerns || []).slice(0,3).forEach(c => addTag(tagsEl, c.charAt(0).toUpperCase() + c.slice(1)));

    const grid = document.getElementById("topicsGrid");
    grid.innerHTML = "";
    TOPICS.forEach(topic => {
        const imgSrc = IMAGES[topic.id] || "";
        const tile = document.createElement("div");
        tile.className = "topic-tile" + (topic.wide ? " wide" : "") + (topic.isQuiz ? " quiz-tile" : "");
        tile.onclick   = () => openTopic(topic);
        tile.innerHTML = `<img class="tile-img" src="${imgSrc}" alt="${topic.title}" loading="lazy">
            <div class="tile-overlay"></div>
            <div class="tile-arrow"><i class="fas fa-arrow-right"></i></div>
            <div class="tile-content">
                <span class="tile-icon">${topic.icon}</span>
                <div class="tile-label">${topic.label}</div>
                <div class="tile-title">${topic.title}</div>
            </div>`;
        grid.appendChild(tile);
    });

    document.getElementById("loadingScreen").style.display = "none";
    document.getElementById("hubPage").style.display       = "block";
}

function addTag(container, text) {
    const t = document.createElement("span");
    t.className   = "profile-tag";
    t.textContent = text;
    container.appendChild(t);
}

// ══════════════════════════════════════════════════════════
// NAVIGATION
// ══════════════════════════════════════════════════════════
function openTopic(topic) {
    document.getElementById("hubPage").style.display          = "none";
    document.getElementById("subpageContainer").style.display = "block";
    document.getElementById("breadcrumbTitle").textContent    = topic.title;
    const heroImg = document.getElementById("subpageHeroImg");
    heroImg.src   = IMAGES[topic.id] || "";
    heroImg.alt   = topic.title;
    heroImg.style.display = heroImg.src ? "block" : "none";
    document.getElementById("subpageContent").innerHTML = renderPage(topic.id);
    window.scrollTo(0,0);
}
function showHub() {
    document.getElementById("subpageContainer").style.display = "none";
    document.getElementById("hubPage").style.display          = "block";
    window.scrollTo(0,0);
}

// ══════════════════════════════════════════════════════════
// PAGE ROUTER
// ══════════════════════════════════════════════════════════
function renderPage(id) {
    switch(id) {
        case "skintype":    return renderSkinType();
        case "ingredients": return renderIngredients();
        case "comedogenic": return renderComedogenic();
        case "acne":        return renderAcne();
        case "sunscreen":   return renderSunscreen();
        case "myths":       return renderMyths();
        case "deinf":       return renderDeinfluencing();
        case "quiz":        return renderQuizHub();
        default:            return "<p>Coming soon.</p>";
    }
}

// SKIN TYPE PAGE — 2x comprehensive
// ══════════════════════════════════════════════════════════
function renderSkinType() {
    const skin = userProfile?.skinType || "normal";
    const info = SKIN_INFO[skin] || SKIN_INFO.normal;

    const content = {
        oily: `
        <h2 class="article-h2">What is actually happening with your skin</h2>
        <p>Your sebaceous glands are overactive. Sebum is not inherently bad — it is a complex biological secretion comprising triglycerides, wax esters, squalene, free fatty acids, and cholesterol esters that collectively protect the barrier, lubricate the skin surface, and provide mild antimicrobial defence via its acidic pH. The problem is overproduction. Sebaceous gland activity is regulated primarily by androgens — a family of hormones including testosterone and its more potent derivative DHT (dihydrotestosterone) — which bind to androgen receptors in the sebaceous gland and directly upregulate lipid biosynthesis. These receptors are present in all genders. This is why puberty, the luteal phase of the menstrual cycle, pregnancy, post-partum hormonal shifts, and high-stress periods all produce measurable increases in sebum output: cortisol elevates androgen production, which in turn stimulates the glands.</p>
        <p style="margin-top:12px">The follicle density also matters. The T-zone — forehead, nose, and chin — contains a significantly higher number of sebaceous follicles per square centimetre than the rest of the face. This is why oiliness concentrates there even when the rest of the face is manageable. Genetics plays the most substantial role: sebaceous gland size and androgen receptor sensitivity are primarily inherited, which is why oily skin often runs in families regardless of skincare habits.</p>
        <div class="article-highlight"><strong>The rebound trap — the most important concept for oily skin:</strong> When you over-cleanse, use alcohol-based toners, or skip moisturiser, you strip all surface sebum and signal to the glands that protection has been lost. This is a well-documented biological feedback loop. The sebaceous glands respond by increasing production to compensate, making skin oilier 2-4 hours after cleansing than it would have been otherwise. Switching to a gentle non-stripping cleanser twice daily and adding a lightweight gel moisturiser will actually reduce baseline oiliness over 6-8 weeks of consistent use. This is counterintuitive but repeatedly confirmed in clinical practice. The goal is to regulate sebum, not eliminate it.</div>
        <h2 class="article-h2">How oily skin ages differently</h2>
        <p>Oily skin has a measurable advantage in aging. The higher sebum output maintains better surface hydration, provides more natural occlusivity, and means the lipid barrier is inherently more intact. Studies comparing photoaging across skin types consistently show that oily skin develops fine lines and surface texture changes later than dry skin — typically by 5-10 years under equivalent UV exposure. The tradeoff is a higher prevalence of enlarged pores, blackheads, and acne during younger years. Understanding this means that aggressive anti-oil measures taken in your teens and twenties — repeated harsh cleansing, over-exfoliating, over-drying — actively work against your long-term skin health by damaging the barrier you will depend on later.</p>
        <h2 class="article-h2">Signs you have oily skin</h2>
        <ul class="article-list">
            <li><div class="list-dot"></div>Face looks noticeably shiny or greasy within 1-2 hours of washing with no products applied</li>
            <li><div class="list-dot"></div>Makeup visibly slides off, breaks down at the nose and forehead first, or oxidises to an orange tone by midday</li>
            <li><div class="list-dot"></div>Pores look visibly large and prominent particularly on the nose, forehead, and chin</li>
            <li><div class="list-dot"></div>Frequent blackheads and comedones concentrated in the T-zone throughout the year</li>
            <li><div class="list-dot"></div>Blotting paper picks up significant oil 2-3 hours after cleansing</li>
            <li><div class="list-dot"></div>Skin rarely feels tight or dry, even immediately after washing with a foaming cleanser</li>
            <li><div class="list-dot"></div>Sunscreen and foundation tend to break down faster or feel greasy within hours of application</li>
            <li><div class="list-dot"></div>Skin looks worse and oilier in warm, humid climates or in summer months</li>
        </ul>
        <div class="article-warning"><strong>Dehydrated oily skin is very common and frequently mismanaged.</strong> If your skin produces visible oil but also feels tight, appears dull with a greyish cast, or shows surface flaking despite being oily, you likely have dehydrated oily skin. This happens when the epidermis is low in water content despite having adequate surface lipids — commonly caused by over-cleansing, alcohol-based products, or environmental humidity loss. The skin then compensates for perceived dryness by producing even more sebum. Adding a lightweight water-based hyaluronic acid serum and a gel moisturiser often breaks this cycle and reduces oiliness noticeably within 2-3 weeks.</div>
        <h2 class="article-h2">Common mistakes that make oily skin worse</h2>
        <p><strong>Over-cleansing:</strong> Washing more than twice daily, using hot water, or using harsh foaming cleansers strips the acid mantle (the slightly acidic surface film at pH 4.5-5.5 that defends against bacteria and irritants) and triggers the rebound described above. A gentle gel or low-foam cleanser formulated for normal-to-oily skin, used at room-temperature water, twice daily maximum, is the correct approach.</p>
        <p style="margin-top:10px"><strong>Skipping moisturiser:</strong> Leaving skin bare after cleansing accelerates TEWL and drives dehydrated oily skin, which then produces more oil. A gel moisturiser with zero occlusive heaviness — primarily glycerin, hyaluronic acid, and light-humectant film formers — provides adequate moisture signalling without congesting pores.</p>
        <p style="margin-top:10px"><strong>Mattifying primers and heavy silicones:</strong> Thick silicone-heavy primers designed to control shine work by physically filling the pore openings with polymer molecules. While they temporarily reduce shine, they trap sebum and dead cells inside follicles and are a reliable trigger for milia and comedone formation with regular use.</p>
        <h2 class="article-h2">Your AM and PM routine framework</h2>
        <p><strong>Morning:</strong> Gentle gel cleanser → niacinamide 5-10% serum (reduces sebum production and pore appearance) → gel moisturiser (glycerin-based, no heavy occlusives) → fluid or water-gel SPF 50 (specifically formulated for oily skin — Korean and Japanese options are outstanding for this).</p>
        <p style="margin-top:10px"><strong>Evening:</strong> Gentle gel cleanser → salicylic acid 0.5-2% (3-4 nights per week, not daily — BHA exfoliates inside pores) → niacinamide serum → light gel moisturiser. On nights not using BHA, you can use a retinol 0.025-0.05% in place of the exfoliant to further regulate cell turnover and prevent clogging. Do not use BHA and retinol on the same night.</p>
        <div class="article-info">Zinc PCA toners are worth considering as an intermediate step after cleansing. Zinc inhibits 5-alpha reductase (the enzyme that converts testosterone to the more potent DHT) and has documented sebum-reducing effects in addition to niacinamide. Using both addresses sebum overproduction through complementary mechanisms.</div>`,

        dry: `
        <h2 class="article-h2">The barrier — what it is and why yours struggles</h2>
        <p>Your stratum corneum — the outermost layer of skin, composed of flattened dead corneocytes embedded in a lipid matrix — functions like a brick wall. The corneocytes are the bricks; a precisely structured lamellar arrangement of ceramides, free fatty acids, and cholesterol in approximately a 1:1:1 molar ratio forms the mortar. This intercellular lipid matrix is the primary determinant of barrier function. It controls Transepidermal Water Loss (TEWL) — the passive diffusion of water through the epidermis to the surface where it evaporates. A healthy barrier maintains TEWL below about 5g/m²/hour at rest. In dry skin, that number can be 2-4 times higher, meaning water is continuously escaping faster than it can be replenished. The tightness, flaking, and discomfort you feel after washing is your barrier unable to retain the water that was just added to it.</p>
        <p style="margin-top:12px">The cause of dry skin is reduced sebaceous gland activity — producing less of the lipid film that would normally supplement barrier protection — combined with genetic or age-related depletion of ceramide levels in the stratum corneum itself. Ceramide levels measurably decline with age, which is why skin that was normal at 25 can become progressively drier in the 30s and 40s without any change in skincare habits. Environmental factors — air conditioning, central heating, low-humidity climates, high-altitude locations, and long-haul flights — dramatically accelerate TEWL and can temporarily worsen any skin type's dryness.</p>
        <div class="article-highlight"><strong>The correct layering sequence:</strong> Humectants (hyaluronic acid, glycerin, urea, panthenol) attract water into the epidermis from the environment and from the dermis below. Emollients (squalane, fatty acids, ceramide-containing serums) fill the gaps between corneocytes and soften the surface. Occlusives (shea butter, ceramide creams, petrolatum for the body) form a physical barrier that significantly slows TEWL. Apply in this exact order on damp skin. The moisture on skin when you apply the humectant gives it an immediate water source — if applied to completely dry skin in a low-humidity environment, a humectant like hyaluronic acid can draw water from deeper skin layers and worsen surface dryness.</div>
        <h2 class="article-h2">Dry skin vs dehydrated skin — a critical distinction</h2>
        <p>These terms are frequently used interchangeably but describe fundamentally different conditions requiring different solutions. <strong>Dry skin</strong> is a skin type characterised by low sebum production and structural lipid deficiency — it is largely genetic, relatively stable over time (though it worsens with age), and requires lipid-rich, occlusive products to compensate for what the sebaceous glands do not produce. <strong>Dehydrated skin</strong> is a temporary, reversible condition characterised by insufficient water content in the epidermis — it can affect any skin type including oily skin, is caused by environmental factors, product choices, or inadequate humectant use, and primarily requires humectants and barrier support rather than heavy occlusives. Many people with the dry skin type are simultaneously chronically dehydrated and need both approaches together.</p>
        <h2 class="article-h2">Signs you have dry skin</h2>
        <ul class="article-list">
            <li><div class="list-dot"></div>Skin feels immediately tight and pulls after washing with water alone, before any products are applied</li>
            <li><div class="list-dot"></div>Visible flaking, peeling, or rough patches consistently present — particularly across the cheeks, around the nose, and on the forehead</li>
            <li><div class="list-dot"></div>Fine lines appear visibly more pronounced when skin is at its driest, particularly around the eyes and mouth</li>
            <li><div class="list-dot"></div>Foundation and concealer look cakey, cling to dry patches, and emphasise rather than cover texture</li>
            <li><div class="list-dot"></div>Itchiness, particularly in cold weather, low humidity, heated indoor environments, or air conditioning</li>
            <li><div class="list-dot"></div>Skin rarely if ever appears shiny or oily — blotting paper comes up completely dry</li>
            <li><div class="list-dot"></div>Skin becomes significantly more uncomfortable after flights, during winter, or in desert-climate environments</li>
            <li><div class="list-dot"></div>Skin feels relief almost immediately after applying moisturiser, but the relief is short-lived without a good occlusive</li>
        </ul>
        <div class="article-info"><strong>The pinch test for dehydration:</strong> Gently pinch a small section of skin on your cheek and release. Healthy well-hydrated skin snaps back immediately. Dehydrated skin takes a moment to return to flat, or shows fine surface lines in the pinched area. This tests water content (dehydration), not oil content (dry skin type). Both can be true simultaneously.</div>
        <h2 class="article-h2">Ingredients your skin specifically needs</h2>
        <p>Dry skin responds best to products that simultaneously provide water (humectants), seal the barrier (occlusives), and replace missing structural lipids (ceramides, cholesterol, fatty acids). The single most important product category is a ceramide-rich moisturiser — formulations containing ceramide NP, AP, and EOP alongside cholesterol and fatty acids in approximately a 1:1:1 ratio most closely replicate the natural intercellular lipid matrix. Apply it while your face is still slightly damp from the previous serum step. At night, add a final occlusive layer: shea butter, squalane oil, or a ceramide sleeping mask. This overnight occlusion creates a micro-environment that allows the barrier to regenerate with significantly reduced TEWL during sleep.</p>
        <h2 class="article-h2">Your AM and PM routine framework</h2>
        <p><strong>Morning:</strong> Cream or micellar cleanser (never foaming — it strips your limited natural oil) → hyaluronic acid serum on damp skin → ceramide-rich moisturiser while skin is still slightly damp → SPF 50 moisturising formula (cream or lotion, not gel or fluid). Double-check your SPF is hydrating — many SPF fluids designed for oily skin will feel extremely tight and uncomfortable on dry skin.</p>
        <p style="margin-top:10px"><strong>Evening:</strong> Oil or balm cleanser → glycerin-rich hydrating essence → ceramide moisturiser → squalane oil or shea butter sealed over the top as the final step. 2-3 times per week, replace the squalane step with a lactic acid 5-10% exfoliant before your moisturiser — lactic acid is the correct AHA for dry skin as it also functions as a humectant. Never use BHA (salicylic acid) on dry skin as a routine exfoliant — its oil-dissolving properties remove what little surface lipid you have. Once comfortable, add retinol 0.025-0.05% sandwiched between two moisturiser layers on 1-2 nights per week.</p>`,

        combination: `
        <h2 class="article-h2">The biology of combination skin</h2>
        <p>Combination skin is not oily skin partially managed or dry skin partially maintained — it is a distinct condition arising from an uneven distribution of sebaceous follicles across facial anatomy. The T-zone (forehead, nose, and chin) contains a significantly higher density of sebaceous glands and larger follicle openings than the cheeks and temporal regions. This is normal human anatomy, but the variation between zones is more pronounced in combination skin. The result is fundamentally incompatible needs occupying the same face: the T-zone overproduces sebum and tends toward congestion and breakouts, while the outer face underproduces it and tends toward dryness, tightness, and sometimes flaking.</p>
        <p style="margin-top:12px">The challenge is compounded by the fact that most skincare products are formulated for a single skin type. Rich moisturisers that adequately hydrate the cheeks congest the sebaceous follicles of the T-zone. Lightweight gel formulas that keep the T-zone clear leave the cheeks under-moisturised and uncomfortable. Strong exfoliants that keep T-zone pores clear over-exfoliate the cheeks. This is why uniform full-face product application frequently fails for combination skin — it treats one zone correctly and the other incorrectly by definition.</p>
        <div class="article-highlight"><strong>The zone strategy in practice:</strong> Base products should be chosen for the most challenging zone — typically the T-zone — using lightweight formulas suitable for oily skin. Then apply richer, more occlusive products specifically and only to the dry outer face areas as an additional layer. Niacinamide is the one ingredient that genuinely addresses both zones simultaneously: it reduces sebum production in the T-zone via inhibition of fatty acid synthesis in sebocytes, while improving barrier function and moisture retention in the drier cheek areas. Use it across the full face daily.</div>
        <h2 class="article-h2">How combination skin changes over time</h2>
        <p>Combination skin type is highly sensitive to hormonal changes. During the teen years and early twenties, androgen levels are often high enough that the T-zone can behave almost as oily skin would, with significant shine and breakouts. As androgen levels stabilise and eventually decline from the mid-twenties onward, the T-zone usually becomes less aggressive. By the late thirties and forties, many people who had combination skin find the T-zone has moderated considerably while the cheeks have become drier — effectively transitioning toward normal or dry skin. Adjusting product selection to reflect these changes is important rather than continuing to use oil-control products that made sense at 18 but over-strip the face at 38.</p>
        <h2 class="article-h2">Signs you have combination skin</h2>
        <ul class="article-list">
            <li><div class="list-dot"></div>T-zone looks visibly shiny and oily within a few hours of washing while cheeks feel normal, comfortable, or tight</li>
            <li><div class="list-dot"></div>Breakouts and blackheads occur almost exclusively on the forehead, nose, and chin — not on the cheeks</li>
            <li><div class="list-dot"></div>No single moisturiser ever feels quite right — too rich and heavy on the nose, not quite enough on the cheeks</li>
            <li><div class="list-dot"></div>Pores are noticeably larger, more open, and more congested on the nose versus the outer cheeks</li>
            <li><div class="list-dot"></div>Skin behaviour changes significantly with seasons: oilier and shinier in summer humidity, drier and sometimes flaky on cheeks in winter</li>
            <li><div class="list-dot"></div>Blotting paper picks up clear oil from the T-zone but shows very little from the cheeks</li>
            <li><div class="list-dot"></div>Foundation wears unevenly — breaking down on the nose while looking dry or cakey on the cheeks</li>
        </ul>
        <h2 class="article-h2">Exfoliation strategy for combination skin</h2>
        <p>Uniform exfoliation is one of the most common mistakes for combination skin. Applying a strong AHA like glycolic acid or mandelic acid across the full face treats the drier cheek areas far more aggressively than the T-zone requires, leading to over-exfoliation, barrier disruption, and increased sensitivity in those areas while the T-zone may still be congested. The correct approach is targeted: apply BHA (salicylic acid 0.5-2%) specifically to the T-zone on 3-4 evenings per week. On cheeks, either skip exfoliants entirely or use a very gentle lactic acid 5% no more than twice weekly. This zone-specific exfoliation keeps the T-zone clear without over-sensitising the rest of the face.</p>
        <h2 class="article-h2">Your AM and PM routine framework</h2>
        <p><strong>Morning:</strong> Balanced gel or micellar cleanser → niacinamide 5-10% serum full face → lightweight gel-cream moisturiser full face → SPF 50 fluid or gel. If cheeks are very dry, apply a small amount of richer moisturiser specifically on the cheeks over the gel moisturiser before SPF.</p>
        <p style="margin-top:10px"><strong>Evening:</strong> Gel cleanser → BHA (salicylic acid) T-zone only 3-4 nights per week, OR lactic acid on cheeks only 1-2 nights per week (not the same night) → niacinamide serum full face → lightweight gel-cream full face, plus richer cream on cheeks if needed. 1-2 nights per week use retinol 0.025-0.05% in place of exfoliant — apply across the full face as retinoids regulate cell turnover in both zones beneficially.</p>`,

        sensitive: `
        <h2 class="article-h2">What sensitive skin actually is — the barrier model</h2>
        <p>Sensitive skin is not a fixed inherent skin type in the same way that oily or dry skin is — it is a functional state reflecting the current integrity of the skin barrier. The stratum corneum provides a physical, chemical, and immunological defence between the external environment and the living epidermis below. When this barrier is functioning well, even moderately irritating ingredients are kept at the surface and do not penetrate to cells that can mount immune responses. When the barrier is depleted — in ceramides, fatty acids, cholesterol, or natural moisturising factor (NMF) components — its permeability increases and the threshold for triggering reactivity drops dramatically.</p>
        <p style="margin-top:12px">In people with consistently sensitive skin, this barrier is structurally compromised — either genetically (filaggrin gene mutations, associated with eczema, are present in 10-15% of the population and cause inherent barrier dysfunction) or through years of product choices that have progressively weakened it. Fragrance molecules, alcohol denat, strong surfactants, and repeated over-exfoliation all contribute to chronic barrier degradation. The sensitisation compounds: as the barrier thins, immune cells in the epidermis — Langerhans cells — become increasingly accessible to antigens, making allergic responses more likely with each exposure. This is why sensitive skin often seems to get worse over time when treated aggressively rather than better.</p>
        <div class="article-highlight"><strong>The repair-first protocol:</strong> No amount of active ingredients will benefit skin that is too reactive to tolerate them. Before introducing niacinamide, vitamin C, retinol, or any exfoliant, you must establish a stable baseline with a stripped-back routine. This means 4-6 weeks of only: a gentle non-foaming fragrance-free cleanser, a ceramide-rich moisturiser, and a mineral SPF. When skin is consistently comfortable — no stinging, no redness after application, no flaking — you can begin single-product introductions with a minimum 2-week gap between each addition.</div>
        <h2 class="article-h2">The difference between sensitive, reactive, and allergy-prone</h2>
        <p><strong>Sensitive skin</strong> reacts to a wide range of products with stinging, redness, or discomfort — driven primarily by barrier dysfunction allowing irritants to penetrate and stimulate nerve endings and immune cells. <strong>Reactive skin</strong> is similar but often describes faster, more dramatic responses — flushing, immediate burning — sometimes indicating a vascular component such as rosacea-prone skin. <strong>Allergy-prone skin</strong> (contact allergic dermatitis) involves a specific acquired immune response to particular allergens — typically fragrance compounds, preservatives, or metals — that triggers a reproducible reaction each time that specific ingredient contacts the skin. All three can coexist, and distinguishing them matters because the management differs. Patch testing by a dermatologist can identify specific allergens if you react even to minimalist formulas.</p>
        <h2 class="article-h2">Signs you have sensitive skin</h2>
        <ul class="article-list">
            <li><div class="list-dot"></div>Skin turns red, stings, burns, or itches after applying products — including products labelled gentle, hypoallergenic, or dermatologist-tested</li>
            <li><div class="list-dot"></div>Redness appears rapidly and can take 20-60 minutes or longer to fully subside</li>
            <li><div class="list-dot"></div>Fragranced products, essential oils, or anything with a strong or synthetic scent reliably causes a reaction</li>
            <li><div class="list-dot"></div>Temperature changes trigger visible flushing — moving from air conditioning to outdoor heat, entering a warm room, exercising</li>
            <li><div class="list-dot"></div>Skin flares predictably during stress, illness, hormonal fluctuations, and sleep deprivation</li>
            <li><div class="list-dot"></div>You have had to discontinue multiple products across different categories due to adverse reactions</li>
            <li><div class="list-dot"></div>Physical contact — rough towels, tight clothing around the face, wind — causes prolonged redness or irritation</li>
            <li><div class="list-dot"></div>Skin feels more comfortable with fewer products on it than with more</li>
        </ul>
        <div class="article-warning"><strong>Rosacea requires specific management beyond standard sensitive-skin care.</strong> If you experience persistent central facial redness that does not fully resolve, visible broken capillaries (telangiectasia) on the nose or cheeks, facial flushing triggered by alcohol, spicy foods, heat, or exercise, or acne-like papules and pustules in a central distribution, you may have rosacea. This is a chronic vascular and inflammatory condition with distinct subtypes, each requiring different treatments. A dermatologist can prescribe azelaic acid 15-20%, metronidazole gel, ivermectin cream, or in severe cases oral low-dose doxycycline — all of which outperform standard skincare for rosacea significantly. Treating rosacea with skincare alone manages symptoms but does not address the underlying condition.</div>
        <h2 class="article-h2">Ingredients to specifically prioritise</h2>
        <p>Ceramide NP, AP, and EOP with cholesterol and fatty acids rebuild the compromised barrier structurally. Panthenol (Pro-Vitamin B5) calms inflammation and supports barrier repair. Centella asiatica (madecassoside, asiaticoside) reduces NF-kB-mediated inflammatory signalling and stimulates barrier-strengthening collagen synthesis — it is one of the most studied and best-tolerated anti-inflammatory skincare ingredients available without prescription. Allantoin buffers irritation and promotes healing. These ingredients work together and all have excellent sensitisation safety profiles.</p>
        <h2 class="article-h2">Your AM and PM routine framework</h2>
        <p><strong>Morning:</strong> Fragrance-free cream or micellar cleanser → ceramide moisturiser (fragrance-free — check ingredients, not just front label) → mineral SPF zinc oxide (fragrance-free, no chemical filters initially). That is three products. No serum, no toner, nothing else until the baseline holds for 6 weeks.</p>
        <p style="margin-top:10px"><strong>Evening:</strong> Same cleanser → centella asiatica serum or panthenol-rich serum if adding a first active → ceramide moisturiser. After 6 weeks of stability: trial azelaic acid 10% 3 nights per week as a treatment step. After a further 6 weeks of stability: trial niacinamide 5% full face. Retinol comes last — at 0.025%, sandwiched between two moisturiser layers, once per week only, and increase the frequency only after 8 weeks of no adverse response.</p>`,

        normal: `
        <h2 class="article-h2">The biology of normal skin</h2>
        <p>Normal skin is defined by the balance between oil production, water retention, and immune tolerance. The sebaceous glands produce adequate sebum to maintain barrier lipid supplementation without excess, meaning the skin surface has sufficient protection without visible shine or congestion. The stratum corneum has an intact lipid matrix with ceramide levels appropriate for effective water retention — TEWL sits within normal ranges, and the skin does not feel tight or uncomfortable. The skin microbiome is balanced and diverse, with Cutibacterium acnes, Staphylococcus epidermidis, and Malassezia species present at levels that do not trigger immune activation. Pores exist — every human face has pores — but their visible size is kept modest by normal sebum output that does not chronically dilate follicles.</p>
        <p style="margin-top:12px">The critical thing to understand about normal skin is that this balance is not passive or permanent — it requires consistent input to maintain. UV radiation, harsh products, over-exfoliation, sleep deprivation, nutritional deficiencies, and environmental stressors all push normal skin toward oily, dry, or sensitised states. Normal skin often produces less dramatic feedback than other types when early damage accumulates: it does not break out loudly, does not flake visibly, and does not sting. This makes it easier to develop habits — sun avoidance, skipping SPF, aggressive cleansing — that cause significant invisible damage before any surface signs appear.</p>
        <div class="article-highlight"><strong>Photoaging is your primary concern.</strong> Studies of identical twins with different sun exposure histories show that UV exposure explains approximately 80% of visible facial aging differences. The degradation of collagen and elastin by UVA-generated reactive oxygen species, the induction of matrix metalloproteinases (enzymes that break down collagen) by UVB, and the cumulative DNA damage to keratinocytes from both rays occurs silently for years before becoming visible as texture changes, pigmentation, laxity, and lines. Normal skin in your 20s and 30s can feel completely invincible to sun damage — and then reveal a decade of accumulated effects rapidly in your early 40s when collagen reserves fall below a visible threshold.</div>
        <h2 class="article-h2">What to prioritise at each life stage</h2>
        <p><strong>Teens and early 20s:</strong> The priority is establishing consistent SPF use before photoaging accumulates and maintaining the barrier with simple products. Avoiding over-exfoliation and over-cleansing in response to occasional breakouts is key — aggressive anti-acne routines designed for oily or acne-prone skin will strip and sensitise normal skin unnecessarily.</p>
        <p style="margin-top:10px"><strong>Mid-20s to 30s:</strong> Introduce vitamin C in the morning — it is a required cofactor for collagen synthesis and provides both antioxidant protection against UV-generated free radicals and brightening via tyrosinase inhibition. Begin retinol in the evenings, starting at 0.025-0.05% and increasing over 3-6 months. This is when retinoid use is most impactful — it takes 3-6 months to produce measurable collagen increase, and the earlier it starts, the larger the collagen reserve it helps build before age-related decline.</p>
        <p style="margin-top:10px"><strong>30s and beyond:</strong> Peptides become a meaningful addition — matrikine peptides like palmitoyl tetrapeptide-7 and Matrixyl 3000 have clinical evidence for stimulating fibroblasts to produce collagen and elastin. Hyaluronic acid topically helps maintain the plump appearance that declines as dermal HA content naturally falls with age. Consider upgrading SPF to 50+ if not already using it, and assess whether your current retinoid has reached its maximum tolerated concentration — many people plateau at retinol and should consider a prescription retinoid for greater efficacy.</p>
        <h2 class="article-h2">Signs you have normal skin</h2>
        <ul class="article-list">
            <li><div class="list-dot"></div>Skin feels comfortable and balanced after washing — no significant tightness, no visible oil within 1-2 hours</li>
            <li><div class="list-dot"></div>Pores are present and visible on the nose but not noticeably enlarged across the rest of the face</li>
            <li><div class="list-dot"></div>Breakouts are occasional and usually linked to identifiable triggers — hormonal cycle, stress, a specific product — not chronic</li>
            <li><div class="list-dot"></div>The vast majority of products are tolerated without stinging, redness, or adverse reaction</li>
            <li><div class="list-dot"></div>Makeup applies smoothly, sits evenly, and lasts reasonably well across the full day</li>
            <li><div class="list-dot"></div>Skin looks and feels relatively consistent throughout the day and does not change dramatically between summer and winter</li>
            <li><div class="list-dot"></div>Skin recovers quickly from temporary disruptions — a period of stress, a holiday, a new product that disagreed slightly — without prolonged aftermath</li>
        </ul>
        <h2 class="article-h2">Your AM and PM routine framework</h2>
        <p><strong>Morning:</strong> Gentle low-foam cleanser → vitamin C serum (L-ascorbic acid 10-15% or sodium ascorbyl phosphate 10-20% if you prefer more stability) → lightweight moisturiser → SPF 50 broad-spectrum. The vitamin C and SPF stack is the most important morning combination for normal skin — antioxidant coverage prevents UV-generated reactive oxygen species from breaking down collagen even when SPF alone cannot block 100% of incident UV.</p>
        <p style="margin-top:10px"><strong>Evening (skin cycling model):</strong> Night 1 — cleanse, exfoliant (AHA lactic or glycolic 5-10% or BHA salicylic 1-2%), moisturiser. Night 2 — cleanse, retinol 0.025-0.05%, moisturiser. Night 3 — cleanse, ceramide-rich recovery moisturiser only (barrier repair). Night 4 — repeat night 3. Then cycle again from Night 1. This 4-night rotation provides regular exfoliation and retinoid use while ensuring adequate barrier recovery time. After 3 months, you can experiment with increasing retinol concentration or frequency as your skin acclimatises.</p>
        <div class="article-info">Peptides are worth adding to a normal skin routine in your 30s. Unlike retinoids, they cause no irritation or downtime. Matrixyl (palmitoyl pentapeptide-4) and Argireline (acetyl hexapeptide-3) have the most substantial evidence bases. Apply them before moisturiser in the evening. Results require a minimum of 8-12 weeks of consistent use to become measurable.</div>`,
    };

    return `<div class="article-eyebrow">Deep Dive</div>
        <h1 class="article-title">Understanding Your ${info.label}</h1>
        <p class="article-intro">This is what is actually happening with your skin at a biological level — including the mechanics behind common advice, why some of it works, and why some of it reliably makes things worse.</p>
        <div class="article-body">${content[skin] || content.normal}</div>`;
}

}

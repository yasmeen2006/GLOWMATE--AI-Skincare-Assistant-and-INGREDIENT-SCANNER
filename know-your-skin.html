function renderAcne() {
    const acneHtml = ACNE_TYPES.map(a => {
        const dotColors = { mild:"#e8f5e9", moderate:"#fff9c4", severe:"#ffebee" };
        const bg = dotColors[a.severity] || "#f5f5f5";
        return `
        <div class="acne-item">
            <div class="acne-icon" style="background:${bg};">${a.emoji}</div>
            <div class="acne-info">
                <div class="acne-header">
                    <span class="acne-name">${a.name}</span>
                    <span class="severity ${a.severity}">${a.severity.charAt(0).toUpperCase()+a.severity.slice(1)}</span>
                </div>
                <div class="acne-sub">What it is</div><div class="acne-text">${a.what}</div>
                <div class="acne-sub">What causes it</div><div class="acne-text">${a.cause}</div>
                <div class="acne-sub treat">How to treat it</div><div class="acne-text">${a.treat}</div>
                <div class="acne-sub">Expected timeline</div><div class="acne-text">${a.time}</div>
            </div>
        </div>`}).join("");

    return `<div class="article-eyebrow">Breakouts Explained</div>
        <h1 class="article-title">Acne, Scars and Pigmentation</h1>
        <p class="article-intro">Not all acne is the same — and using the wrong treatment for the wrong type can make things significantly worse. This guide covers every type with clinical detail, the biology of what drives acne, what happens after breakouts heal, and the full treatment landscape from OTC to prescription.</p>
        <div class="article-body">
            ${acneHtml}

            <div class="article-warning" style="margin-top:8px"><strong>Nodular and cystic acne cannot be adequately treated with over-the-counter products.</strong> The inflammation sits too deep in the dermis for topical actives to reach therapeutically effective concentrations. Attempting to treat severe acne without medical intervention extends the inflammatory period, dramatically increasing the risk of permanent scarring. If you have had nodules or cysts persisting longer than 4 weeks, or if you are developing new ones regularly, a dermatology appointment is the correct next step — not a new OTC product.</div>

            <h2 class="article-h2">The four-factor model of acne — why it requires multiple approaches</h2>
            <p>Acne is not caused by a single factor that a single product can fix. It is caused by four biological processes occurring simultaneously, each amplifying the others:</p>
            <ul class="article-list">
                <li><div class="list-dot"></div><strong>Androgen-driven sebum overproduction:</strong> Testosterone and dihydrotestosterone (DHT) bind to androgen receptors in the sebaceous gland and directly upregulate lipid biosynthesis. Higher sebum production means a richer nutrient environment for bacteria, larger follicle distension, and more material to form comedones.</li>
                <li><div class="list-dot"></div><strong>Abnormal follicular keratinisation:</strong> In acne-prone skin, the corneocytes (dead skin cells) lining the follicle wall are shed in an irregular pattern and become abnormally cohesive — sticky rather than dispersing freely. They accumulate inside the follicle and form the initial microcomedone, the precursor to every visible acne lesion.</li>
                <li><div class="list-dot"></div><strong>C. acnes bacterial colonisation:</strong> Cutibacterium acnes (formerly Propionibacterium acnes) is a gram-positive anaerobic bacterium that is part of the normal skin microbiome at low levels. When the sebum-rich, low-oxygen environment of a blocked follicle develops, C. acnes proliferates rapidly. It metabolises sebum triglycerides into pro-inflammatory free fatty acids and activates toll-like receptor 2 (TLR-2) on immune cells, triggering the inflammatory cascade.</li>
                <li><div class="list-dot"></div><strong>Immune-mediated inflammation:</strong> The innate immune response to C. acnes and its metabolites produces interleukins, tumour necrosis factor-alpha, and matrix metalloproteinases. These simultaneously create the visible redness and swelling of inflammatory acne and, in severe cases, break down the collagen framework of the surrounding dermis — the mechanism of acne scarring.</li>
            </ul>
            <p style="margin-top:12px">This is why single-ingredient approaches rarely achieve full clearance. Salicylic acid addresses factors 1, 2, and partially 3. Benzoyl peroxide addresses factors 3 and 4. Retinoids address factors 2 and 1. Niacinamide addresses factors 1 and 4. A routine combining complementary actives addresses all four factors simultaneously and produces significantly better outcomes than any single active used alone.</p>

            <h2 class="article-h2">Hormonal acne — patterns, triggers, and what actually helps</h2>
            <p>Hormonal acne has specific distinguishing characteristics: it tends to concentrate along the lower face — jawline, chin, and neck — appears in a cyclical pattern that worsens in the week before menstruation (when progesterone peaks and oestrogen drops, relatively elevating androgen activity), and often presents as deep, painful, slow-resolving cysts rather than surface pustules. It responds poorly to topical-only treatment because the driver is systemic, not surface-level.</p>
            <p style="margin-top:10px">For those with an ovarian/hormonal cycle, the most effective approaches for hormonal acne are: combined oral contraceptives containing anti-androgenic progestins (cyproterone acetate, drospirenone, chlormadinone) — these directly suppress the androgen activity that stimulates sebum production — and spironolactone, an aldosterone antagonist that also has potent anti-androgenic effects on the skin. Both require a prescription and ongoing monitoring. Inositol supplementation and dietary glycaemic-index reduction are evidence-informed adjunct measures that can reduce androgenic signalling via the insulin pathway, but cannot replicate prescription hormonal treatment. People with PCOS (polycystic ovary syndrome) almost always have a hormonal driver to their acne and typically see dramatically better results with hormonal treatment than topical treatment alone.</p>
            <div class="article-highlight"><strong>The stress-acne cycle is real and specific:</strong> Cortisol (the primary stress hormone) directly stimulates sebaceous gland activity via corticotropin-releasing hormone (CRH) receptors present in sebocytes. It also upregulates substance P in sensory nerves near sebaceous glands — substance P is a neuropeptide that activates mast cells and triggers inflammation. Chronic psychological stress therefore simultaneously increases sebum production and increases the inflammatory response to any existing bacterial load. Breakouts during exam periods, deadlines, or significant life stress are not coincidental — they are a reproducible biological response. Sleep deprivation compounds this: growth hormone (released primarily during deep sleep) has sebum-suppressive effects that are lost with consistent poor sleep.</div>

            <h2 class="article-h2">Post-acne marks — understanding PIH, PIE, and true scars</h2>
            <p><strong>Post-Inflammatory Hyperpigmentation (PIH)</strong> — flat dark or brown marks — occurs when melanocytes (melanin-producing cells) are activated during the inflammatory process and deposit melanin in the epidermis and superficial dermis. This is most common in medium to deep skin tones (Fitzpatrick III-VI) because these skin types have more melanocytes that are more readily activated by inflammation. PIH is not scarring — it is discolouration. It will fade naturally over weeks to months, but can be actively accelerated with ingredients that inhibit melanin production or transfer:</p>
            <ul class="article-list">
                <li><div class="list-dot"></div><strong>Vitamin C</strong> (10-20% L-ascorbic acid or a stable derivative): inhibits tyrosinase (the rate-limiting enzyme in melanin synthesis) and neutralises the reactive oxygen species that activate melanocytes during UV exposure and inflammation.</li>
                <li><div class="list-dot"></div><strong>Niacinamide</strong> (4-10%): does not inhibit melanin synthesis but reduces the transfer of melanosomes (melanin-containing vesicles) from melanocytes to surrounding keratinocytes — reducing how much melanin is distributed into the skin even when production is high.</li>
                <li><div class="list-dot"></div><strong>Alpha Arbutin</strong> (1-2%): a glycosylated form of hydroquinone that inhibits tyrosinase with a significantly better safety profile. Effective and well-tolerated, including in sensitive skin.</li>
                <li><div class="list-dot"></div><strong>Tranexamic Acid</strong> (2-5%): inhibits the plasminogen-plasmin pathway that activates melanocytes in response to UV and inflammation. Particularly effective for PIH in darker skin tones and for post-inflammatory redness.</li>
                <li><div class="list-dot"></div><strong>Azelaic Acid</strong> (10-20%): inhibits tyrosinase and has anti-inflammatory properties — addressing both the PIH and the underlying inflammation simultaneously. Available OTC at 10%, prescription at 15-20%.</li>
                <li><div class="list-dot"></div><strong>SPF 50 every single day:</strong> UV exposure activates melanocytes and darkens existing PIH within minutes. No brightening ingredient can work effectively if UV darkening is occurring simultaneously. SPF is not optional when treating PIH — it is the single most important step.</li>
            </ul>
            <p style="margin-top:12px"><strong>Post-Inflammatory Erythema (PIE)</strong> — flat pink or red marks — is distinct from PIH. Where PIH is melanin-based discolouration, PIE is caused by damaged or dilated capillaries left behind after the inflammatory process resolved. It presents as pink-red flat marks that blanch when pressed (they disappear under pressure, then return — this distinguishes them from PIH which does not blanch). PIE is more common in fair skin (Fitzpatrick I-II). It responds to different actives: niacinamide reduces capillary permeability, azelaic acid reduces redness, centella asiatica calms vascular inflammation, and green tea extract (EGCG) has documented effects on reducing post-inflammatory vascular damage. PIE also responds to professional treatments including pulsed dye laser and intense pulsed light (IPL).</p>
            <p style="margin-top:12px"><strong>True atrophic acne scars</strong> — ice-pick (deep, narrow pits going straight down into the dermis), boxcar (wider depressions with sharply defined vertical edges, like a box lid pressed into skin), or rolling scars (undulating, wave-like surface texture caused by fibrous bands tethering the dermis to subcutaneous tissue) — are permanent structural changes. They represent areas where the collagen framework in the dermis was destroyed by the inflammatory process and replaced with disordered, contracted scar tissue. Topical skincare cannot rebuild a collagen scaffold that no longer exists. What professional treatments can do: microneedling with radiofrequency (creates controlled micro-injuries that stimulate new collagen III synthesis), TCA CROSS (trichloroacetic acid applied precisely to ice-pick scar bases to cause focused chemical coagulation and subsequent collagen induction), fractional CO2 or erbium laser resurfacing (ablates the epidermis and upper dermis to trigger comprehensive remodelling — most aggressive option with significant downtime but highest efficacy), and subcision (a dermal needle physically breaks up the fibrous tethering bands under rolling scars, allowing the depressed areas to lift). Multiple sessions of any of these are typically needed. Results accumulate over 3-12 months as new collagen forms and matures.</p>
            <div class="article-info"><strong>The single highest-leverage action for preventing both PIH and true scars:</strong> Stop touching, picking, squeezing, or applying pressure to any inflamed lesion. This is consistently the most clinically impactful recommendation a dermatologist can make and consistently the most difficult to follow. Each manual trauma extends the inflammatory period, drives bacteria into adjacent follicles, ruptures follicle walls, and dramatically increases both the pigmentation and structural damage outcomes. Hydrocolloid patches worn over spots significantly reduce the urge to touch and provide a moist healing environment that speeds resolution — they are among the highest value, lowest cost tools available for managing acne.</div>
        </div>`;
}

            <div class="spf-row"><div class="spf-badge">SPF 30</div><div class="spf-info"><h4>Blocks approximately 97% of UVB rays</h4><p>The minimum most dermatologists recommend for daily use. Represents a meaningful step up from SPF 15 — the difference between 93% and 97% blocked seems small but is significant over a lifetime of cumulative exposure.</p></div></div>
            <div class="spf-row"><div class="spf-badge">SPF 50</div><div class="spf-info"><h4>Blocks approximately 98% of UVB rays</h4><p>Recommended for daily use, outdoor activities, anyone with existing pigmentation concerns, post-treatment skin, or personal or family history of skin cancer. The incremental improvement over SPF 30 is modest but meaningful with consistent use.</p></div></div>
            <div class="spf-row"><div class="spf-badge">SPF 50+</div><div class="spf-info"><h4>Blocks 98-99% of UVB rays</h4><p>For very fair skin, personal or family history of skin cancer, extended time outdoors, or anyone in a high-UV environment (near the equator, high altitude, reflective surfaces like snow or water). The practical difference from SPF 50 is minimal for most people.</p></div></div>

            <div class="article-info" style="margin-top:16px"><strong>The UVA gap:</strong> SPF only measures UVB protection — the rays responsible for burning. UVA rays, which cause collagen degradation, deep pigmentation, and contribute to skin cancer, are not measured by SPF. Always look for Broad-Spectrum designation, PA+++ or higher (Asian market), or UVA circle logo (European market). UVA penetrates glass and cloud cover at similar intensity year-round. A window seat in an office or car provides no meaningful UVA protection.</div>

            <h2 class="article-h2">Chemical vs Mineral sunscreens</h2>
            <p><strong>Chemical filters</strong> (avobenzone, octinoxate, tinosorb S, tinosorb M, uvinul A plus) absorb UV radiation and convert it to harmless heat energy through a photochemical reaction. They are absorbed into the skin surface, making them completely invisible on all skin tones. Modern European chemical filters like tinosorb S and M provide superior photostability compared to older US-approved filters. Apply 15-20 minutes before sun exposure to allow the filter molecules to bind to the skin. Some individuals find chemical filters irritating, particularly on sensitive or rosacea-prone skin.</p>
            <p style="margin-top:12px"><strong>Mineral filters</strong> (zinc oxide, titanium dioxide) work by a combination of absorption and reflection, sitting primarily at the skin surface. They provide protection immediately on application without a waiting period. Less likely to cause irritation or allergic reactions, making them the default recommendation for sensitive, reactive, and rosacea-prone skin. Modern micronised and nano-particle formulations have eliminated the white cast that made earlier mineral sunscreens unwearable on darker skin tones. Tinted versions exist for all skin tones and provide excellent blendability.</p>
            <div class="article-warning" style="margin-top:12px">Most people apply only 25-50% of the quantity of sunscreen required to achieve the labelled SPF. SPF is tested at 2mg per square centimetre of skin. For the face alone, this equates to approximately 1/4 teaspoon (1.25ml). Using half of this effectively reduces SPF 50 protection to approximately SPF 7. The two-finger method (two full strips of product across your index and middle fingers) is a practical guide for face and neck coverage.</div>

            <h2 class="article-h2">Recommended picks for ${skinLabel}</h2>
            ${rec.picks.map(p => `<div class="spf-row"><div class="spf-badge">SPF 50</div><div class="spf-info"><h4>${p}</h4></div></div>`).join("")}

            <h2 class="article-h2">Reapplication — what actually happens</h2>
            <p>SPF degrades with sun exposure — chemical filters undergo photodegradation as they absorb UV energy, and physical coverage is disrupted by sweating, touching, and oil production. Dermatologists recommend reapplication every 2 hours of sun exposure, or immediately after swimming or heavy sweating. For daily indoor use with brief outdoor exposure, a single morning application is generally sufficient. SPF powder topcoats exist for mid-day reapplication over makeup and are a practical option, though they require a very generous application to achieve meaningful protection.</p>
        </div>`;
}

function renderMyths() {
    const skin     = userProfile?.skinType || "normal";
    const concerns = userProfile?.concerns || [];
    const hasAcne  = concerns.some(c => ["acne","breakouts"].includes(c.toLowerCase()));

    const myths = [
        { m: "Natural and organic ingredients are always safer and better", t: "Poison ivy is natural. Coconut oil is natural and has a comedogenic rating of 4/5. Arsenic is natural. The word natural has no legal or scientific definition in cosmetics — any brand can use it on any product without meeting any standard or undergoing any verification. Synthetic ingredients like niacinamide, hyaluronic acid, and ceramides are among the most rigorously tested and safest compounds in dermatological history. Meanwhile, many natural ingredients — essential oils, citrus extracts, cinnamon, clove — are among the most common documented skin sensitisers and contact allergens." },
        { m: "You don't need sunscreen on cloudy days or indoors", t: "UVA rays — which cause collagen degradation, DNA damage, elastin breakdown, and contribute to skin cancer — penetrate glass windows and cloud cover at up to 80% of their clear-sky intensity. Studies following truck drivers and delivery workers found significantly more photoaging and solar keratoses on the sun-facing side of their face after decades of work near windows. UVA intensity also remains relatively consistent throughout the year regardless of season, unlike UVB which peaks in summer. SPF is a year-round daily requirement for everyone — not just on beach days." },
        { m: "Washing your face more often prevents and clears breakouts", t: "Over-cleansing is one of the most common drivers of worsening skin conditions. The acid mantle — a slightly acidic film at pH 4.5-5.5 that protects against bacteria and irritants — is disrupted by excessive cleansing. Washing more than twice daily strips the barrier's natural oils, kills beneficial bacteria, increases skin permeability to irritants, and triggers rebound sebum production as the sebaceous glands compensate for surface oil removal. Dermatologists universally recommend a maximum of twice daily — morning and evening. If you exercise, a gentle water-only or micellar water rinse is sufficient rather than a full cleanser application." },
        { m: "Tingling or burning means a product is working", t: "Tingling and burning are signs of irritation, not efficacy. They indicate that the product is at too low a pH for your current barrier state, contains irritants your skin is reacting to, or is being applied over a compromised barrier. Well-formulated active ingredients at appropriate concentrations for the application — retinol, vitamin C, AHAs — should produce no sensation on intact skin. Chronic, repeated irritation disrupts the barrier, triggers melanocytes to produce hyperpigmentation, causes the kind of inflammation that accelerates visible aging, and paradoxically makes all your active ingredients less effective by reducing penetration through an inflamed barrier." },
        { m: "Pores open and close with hot and cold water", t: "Pores are passive anatomical structures. They have no muscles, no sphincter mechanism, and no biological capacity to dilate or contract in response to temperature. This is basic skin anatomy. What hot steam can do is temporarily soften the semi-solid sebum inside a pore, making manual extraction of blackheads marginally easier. Cold water applied after may provide a slight vasoconstriction effect that temporarily reduces redness but has no structural effect on pore size. Pore size is determined by genetics, sebum production volume, and the age-related loss of collagen elasticity in the surrounding tissue — not temperature." },
        { m: "SPF in your foundation or moisturiser provides adequate daily protection", t: "SPF testing requires application at exactly 2mg per square centimetre of skin. Research consistently shows people apply their moisturiser or foundation at 20-50% of that quantity — some studies suggest as little as 12-15% of the required amount. At 25% of needed application, SPF 30 moisturiser provides approximately SPF 5-7 in real conditions. A dedicated sunscreen applied as the final skincare step in the correct amount is the only reliable method of achieving the protection stated on the label. SPF moisturisers and SPF-containing foundations can supplement but cannot replace a dedicated sunscreen." },
        { m: "Your skin acclimates to products and they stop working over time", t: "Skin does not develop pharmacological tolerance to cosmetic ingredients in the way the body habituates to drugs. Niacinamide works by the same mechanism indefinitely. Hyaluronic acid binds the same amount of water on day 1000 as on day 1. SPF blocks the same percentage of UV. Retinoids continue to bind to nuclear retinoic acid receptors and upregulate the same genes after years of use. If a product appears to have stopped working, the most scientifically supported explanation is that it has done its job and you have reached a new baseline — or that seasonal and hormonal shifts have changed your skin's presentation. This is commonly misread as the product stopping." },
        { m: "You need to keep rotating products to see continued results", t: "Consistency is what produces meaningful results — and it is the thing the skincare marketing industry most wants you to avoid, because switching products drives purchases. Active ingredients like retinol, vitamin C, niacinamide, and tranexamic acid require weeks to months of uninterrupted daily use to cause measurable cellular changes. Clinical studies establishing their efficacy are conducted over 8-24 weeks of consistent use. Constantly switching routines to chase new trends prevents you from establishing whether anything is actually working and keeps you in a permanent product-introduction cycle where nothing is given long enough to be assessed." },
    ];

    if (hasAcne) {
        myths.push({ m: "Acne is caused by poor hygiene and greasy food", t: "Acne is a medical condition caused by four identifiable biological factors: androgen-driven sebum overproduction, abnormal follicular keratinisation, C. acnes bacterial colonisation, and immune-mediated inflammation. None of these are caused by not washing your face or eating chips. Scrubbing aggressively actually spreads C. acnes bacteria laterally across the skin surface and creates micro-tears that worsen inflammation. The high-glycaemic diet and dairy connection exists and is supported by some evidence — both raise IGF-1 which stimulates sebum — but it varies significantly by individual and is not the primary mechanism for most people." });
        myths.push({ m: "Toothpaste or lemon juice are effective spot treatments", t: "Toothpaste contains sodium lauryl sulfate, sodium fluoride, and flavourings — all documented skin irritants at the concentrations found in dental products. Applied to a spot, they cause chemical irritation and dehydration of the surrounding healthy skin and significantly increase post-inflammatory hyperpigmentation. Lemon juice has a pH of approximately 2.0-2.5 — comparable to a clinical-grade TCA chemical peel — and can cause genuine chemical burns on the delicate skin around an inflamed lesion. Both make the aftermath of a spot dramatically worse than the spot itself would have been. Benzoyl peroxide, salicylic acid, or sulfur spot treatments are specifically formulated to address the relevant biology without collateral skin damage." });
    }
    if (skin === "oily") myths.push({ m: "Oily skin does not need moisturiser", t: "Oil and water are entirely different substances serving different functions. Sebum is a lipid that helps seal the stratum corneum barrier and has mild antimicrobial properties. Water content in the epidermis determines hydration status and barrier function. Oily skin can be — and very commonly is — simultaneously dehydrated, meaning it lacks water in the epidermis despite an excess of surface lipids. When dehydrated oily skin is left without a moisturiser, the dehydration signals trigger increased sebum production as the skin attempts to compensate. A lightweight water-gel or fluid moisturiser applied morning and evening will, over 4-8 weeks, measurably reduce oiliness, not increase it." });
    if (skin === "dry") myths.push({ m: "Drinking more water will fix dry skin", t: "The relationship between systemic hydration and skin surface hydration is indirect and limited. Severe dehydration does affect skin turgor and elasticity, but once you are adequately hydrated, additional water intake produces no measurable improvement in skin moisture levels. The epidermis is not a sponge that fills from the inside based on water intake. Skin surface hydration is controlled by the barrier function of the stratum corneum — specifically the integrity of its lipid matrix, ceramide levels, and TEWL rate. What actually addresses dry skin: topical humectants applied to damp skin, followed by emollients and occlusives that prevent water from evaporating. No amount of drinking water substitutes for this." });
    if (skin === "sensitive") myths.push({ m: "If a product is labelled hypoallergenic, it cannot cause a reaction", t: "Hypoallergenic has no legal definition or regulatory standard in any country. Any brand can place it on any product without any testing requirement or specific formulation standard. In practice, products labelled hypoallergenic regularly contain fragrance (a leading contact allergen), essential oils, methylisothiazolinone (a preservative responsible for a global sensitisation epidemic), and other documented irritants. Reading the ingredient list rather than the marketing claims on the front of a product is the only reliable way to assess its potential for reactivity. Fragrance-free (not unscented — these are different) and alcohol-free are the two most meaningful claims for sensitive skin." });

    return `<div class="article-eyebrow">Debunked</div>
        <h1 class="article-title">Skincare Myths — What the Science Says</h1>
        <p class="article-intro">These myths are so thoroughly embedded in mainstream skincare culture that many dermatologists report spending a significant portion of their consultations correcting them. Each myth below is addressed with the actual published evidence.</p>
        <div class="article-body">
            ${myths.map(m => `<div class="myth-item">
                <div class="myth-badge myth"><i class="fas fa-times"></i> Myth</div>
                <div class="myth-claim">"${m.m}"</div>
                <div class="myth-badge truth" style="margin-top:12px"><i class="fas fa-check"></i> The Science</div>
                <div class="myth-truth">${m.t}</div>
            </div>`).join("")}
        </div>`;
}

function renderDeinfluencing() {
    const skin     = userProfile?.skinType || "normal";
    const concerns = userProfile?.concerns || [];
    const hasAcne  = concerns.some(c => ["acne","breakouts"].includes(c.toLowerCase()));

    const items = [
        { c:"A 10-step routine produces better results than a simple 3-step one", t:"There is no peer-reviewed clinical evidence that routine complexity improves skin outcomes. Dermatologists consistently demonstrate that cleanser, moisturiser, and SPF address the vast majority of skin biology effectively. Every additional active ingredient layer increases: the risk of barrier disruption from product interactions, the chance of pH incompatibility between actives, irritation from sensitising ingredients, and the difficulty of isolating which product is causing any adverse reaction. The skincare industry profits from complexity. Your skin biology does not benefit from it. Simplicity done consistently outperforms complexity done inconsistently, which is how most people use a 10-step routine in practice." },
        { c:"Clean beauty products are safer than conventional cosmetics", t:"Clean has no legal definition, no regulatory standard, and no required testing protocol in any market globally. Any brand can place the word clean on any product, regardless of formulation, without any verification or external audit. Clean-labelled products consistently contain known skin sensitisers and irritants including essential oils, natural fragrance, and citrus extracts. Many also contain undisclosed fragrance compounds listed only as parfum. Meanwhile, conventional cosmetic products in the EU, UK, and Japan are regulated under rigorous ingredient safety frameworks that require toxicological dossiers for each formulation. What determines safety is the specific ingredient testing history and published toxicology data — not any marketing term on the front of the bottle." },
        { c:"Face oils are universally nourishing and beneficial for all skin types", t:"Face oils vary enormously in comedogenic risk, fatty acid profiles, and skin compatibility. Rosehip oil (primarily linoleic acid) has a comedogenic rating of 1 and is generally well-tolerated. Squalane has a rating of 1. Jojoba (technically a wax ester) rates at 2. Marula rates at 3-4. Coconut oil rates at 4 and causes documented breakouts in a high percentage of oily and acne-prone users within 1-3 weeks of daily use. The marketing narrative — that face oils are inherently nourishing and skin-identical — does not distinguish between oils with a 10-fold difference in comedogenic risk. For oily, acne-prone, or combination skin, oil selection requires care, and many popular influencer-recommended oils are actively contraindicated." },
        { c:"Topical collagen creams and supplements meaningfully restore skin collagen", t:"Topical collagen molecules (molecular weight approximately 300 kDa) are too large to penetrate the stratum corneum, which has a maximum permeation threshold of approximately 500 Da for small molecules — a 600-fold size difference. Applied topically, collagen proteins sit on the skin surface and function only as a humectant, similar to glycerin. They do not reach the dermis. Oral collagen supplements: some low molecular weight hydrolysed peptides (especially below 3 kDa) have shown modest improvements in skin elasticity and hydration in preliminary double-blind studies, but evidence is inconsistent and most studies are industry-funded. What definitively stimulates dermal collagen production: retinoids (upregulate collagen synthesis genes) and vitamin C (required cofactor for procollagen hydroxylation). These have 30+ years of mechanistic and clinical evidence." },
        { c:"Eye creams are a specialist category requiring unique formulations", t:"In the vast majority of cases, eye creams contain the same active ingredients as regular moisturisers — peptides, hyaluronic acid, caffeine, niacinamide, retinol — at slightly lower concentrations in smaller packaging at significantly higher prices per gram. The skin around the eyes is thinner, more delicate, and more sensitive, which makes avoiding fragrance and strong actives sensible in that area. But nothing in an eye cream is exclusively available or uniquely bioavailable for periorbital skin that is not available in a regular gentle moisturiser at a fraction of the cost. This product category was created and is maintained as a marketing construct that exploits consumer concern about eye area aging. A gentle, fragrance-free moisturiser applied carefully to the orbital area works equivalently for most people." },
        { c:"You should periodically do a skin detox to reset your routine", t:"Skin detoxing has no basis in physiology or biochemistry. The skin is a barrier organ — its primary biological purpose is to prevent substances from entering the body. It does not store or accumulate toxins. Actual metabolic detoxification occurs in the liver (cytochrome P450 enzymes) and kidneys (filtration). Skin purging is a real and specific phenomenon: when using retinoids or acids that accelerate cell turnover, congested follicles can surface and expel faster than usual, creating a temporary breakout period within the first 4-6 weeks. This is mechanistically specific and time-limited. It has nothing to do with the vague detox concept sold in marketing copy. Products marketed as skin detoxes are either describing normal cleansing or selling a biological process that does not exist." },
        { c:"Home derma rollers produce similar results to professional microneedling", t:"Professional microneedling uses individually sterilised, single-use medical-grade needles at calibrated depths of 0.5-3mm, adjusted by a trained practitioner for specific tissue zones. At these depths, needles reach the dermis and trigger a controlled wound healing response that stimulates collagen type I and III synthesis over 3-6 months. Consumer derma rollers use needles of 0.2-0.5mm — insufficient to consistently penetrate past the epidermis where collagen is produced. More critically, derma rollers cannot be adequately sterilised between uses: studies have found that dry sterilisation and alcohol soaking do not eliminate bacterial biofilm from the needle tips. Published case reports document bacterial skin infections, viral transmission (molluscum, herpes), and granuloma formation following home device use. The efficacy gap combined with the infection risk makes home rolling a poor cost-benefit trade-off compared to professional treatments." },
    ];

    if (hasAcne) {
        items.push({ c:"Pore strips permanently clear blackheads and produce lasting results", t:"Pore strips adhere to the oxidised upper tip of a blackhead via a pressure-sensitive adhesive and remove that section when stripped off. What remains inside the pore is the entire sebaceous filament root — the cylindrical plug of sebum and dead cells that extends down into the follicle. This root reforms and oxidises at the surface within 2-5 days. Repeated pore strip use gradually stretches the elastin fibres surrounding the pore opening, permanently enlarging pore size over time, while also stripping the surrounding healthy skin of its protective surface lipids. Salicylic acid 0.5-2% used consistently actually dissolves the sebum and dead cell plug from inside the pore, prevents new blockages from forming, and addresses the cause rather than the visible symptom." });
        items.push({ c:"At-home LED masks are a worthwhile investment for clearing acne", t:"Clinical LED therapy protocols use highly specific wavelengths at calibrated irradiance levels measured in joules per square centimetre: blue light at 415nm disrupts C. acnes cell membranes, red light at 630nm reduces inflammatory cytokine production. This mechanism has genuine randomised controlled trial evidence behind it at clinical power densities. Consumer LED masks have been tested in independent studies and found to deliver irradiance levels of 1-10% of what clinical devices produce — far below the therapeutic threshold. A 2022 independent evaluation of popular consumer LED devices found none came close to replicating clinical results. At price points of £150-600 compared to a £10 tube of benzoyl peroxide with decades of clinical evidence, the value proposition is essentially non-existent." });
    }
    if (["oily","combination"].includes(skin)) {
        items.push({ c:"Slugging with Vaseline is beneficial for all skin types", t:"Slugging — applying a thick layer of petrolatum (Vaseline) as the final skincare step — is a legitimate technique with real clinical evidence for very dry skin, eczema-prone skin, and severely compromised barriers. Petrolatum is the most effective occlusive ingredient known, dramatically reducing TEWL overnight and allowing the barrier to regenerate. The clinical indication is important: it was developed and validated for dry, eczema-prone skin. For oily and acne-prone skin, petrolatum creates an airtight film that traps sebum, bacteria, and everything applied underneath in an anaerobic environment ideal for C. acnes proliferation. Widespread TikTok adoption without this clinical context resulted in a predictable wave of new and worsened breakouts among oily and acne-prone users. Technique matters. Skin type matters." });
    }

    return `<div class="article-eyebrow">Honest Talk</div>
        <h1 class="article-title">Stop Buying These</h1>
        <p class="article-intro">Skincare influencers are paid through direct brand deals, product gifting, affiliate commission links, and equity stakes — all of which create financial incentives to promote products regardless of their evidence base. Understanding how the skincare industry markets to you is as essential as understanding your skin.</p>
        <div class="article-body">
            ${items.map(i => `<div class="myth-item">
                <div class="myth-badge myth">📱 Overhyped</div>
                <div class="myth-claim">"${i.c}"</div>
                <div class="myth-badge truth" style="margin-top:12px"><i class="fas fa-lightbulb"></i> The Reality</div>
                <div class="myth-truth">${i.t}</div>
            </div>`).join("")}
        </div>`;
}

function renderQuizHub() {
    activeQuiz = 0;
    return `<div class="article-eyebrow">Interactive</div>
        <h1 class="article-title">Test Your Skin Knowledge</h1>
        <p class="article-intro">Three different quizzes — from identifying your skin type to testing your ingredient science. Try all three.</p>
        <div class="article-body">
            <div class="quiz-selector" id="quizSelector">
                ${QUIZZES.map((q,i) => `
                    <div class="quiz-sel-btn ${i===0?"active":""}" onclick="selectQuiz(${i})">
                        <div class="quiz-sel-title">${q.title}</div>
                        <div class="quiz-sel-desc">${q.desc}</div>
                    </div>`).join("")}
            </div>
            <div id="quizArea">${buildQuizStep(0, 0)}</div>
        </div>`;
}

function selectQuiz(idx) {
    activeQuiz  = idx;
    quizStep    = 0;
    quizAnswers = [];
    quizScores  = {};
    document.querySelectorAll(".quiz-sel-btn").forEach((b,i) => b.classList.toggle("active", i===idx));
    document.getElementById("quizArea").innerHTML = buildQuizStep(idx, 0);
}

function buildQuizStep(quizIdx, step) {
    const quiz = QUIZZES[quizIdx];
    if (!quiz) return "<p>Quiz not found.</p>";
    const q    = quiz.questions[step];
    const dots = quiz.questions.map((_,i) => `<div class="quiz-dot ${i<=step?"active":""}"></div>`).join("");
    return `<div class="quiz-progress">${dots}</div>
        <div class="quiz-q">Q${step+1} of ${quiz.questions.length}. ${q.q}</div>
        <div class="quiz-options">
            ${q.opts.map((o,i) => `<div class="quiz-opt" onclick="quizPick(${quizIdx},${step},${i},this)">${o.l}</div>`).join("")}
        </div>`;
}

function quizPick(quizIdx, step, optIdx, el) {
    const quiz = QUIZZES[quizIdx];
    const opt  = quiz.questions[step].opts[optIdx];
    quizAnswers[step] = opt.s;

    if (quizIdx === 2) {
        document.querySelectorAll(".quiz-opt").forEach((o, i) => {
            o.style.pointerEvents = "none";
            if (quiz.questions[step].opts[i].s.correct === 3) o.classList.add("correct-ans");
        });
        if (opt.s.correct !== 3) el.classList.add("wrong-ans");
        else el.classList.add("correct-ans");
    } else {
        document.querySelectorAll(".quiz-opt").forEach(o => o.classList.remove("picked"));
        el.classList.add("picked");
    }

    setTimeout(() => {
        quizStep = step + 1;
        if (quizStep < quiz.questions.length) {
            document.getElementById("quizArea").innerHTML = buildQuizStep(quizIdx, quizStep);
        } else {
            showQuizResult(quizIdx);
        }
    }, quizIdx === 2 ? 700 : 300);
}

function showQuizResult(quizIdx) {
    const quiz = QUIZZES[quizIdx];

    if (quizIdx === 2) {
        let correct = 0;
        quizAnswers.forEach(a => { if (a && a.correct === 3) correct++; });
        const total = quiz.questions.length;
        const pct   = Math.round((correct/total)*100);
        const msg   = pct === 100 ? "Perfect score! You know your ingredients well." :
                      pct >= 60  ? "Good knowledge! A few areas to brush up on." :
                                   "Great learning opportunity — the answers are all in this guide.";
        document.getElementById("quizArea").innerHTML = `
            <div class="quiz-score">
                <div class="quiz-score-num">${correct}/${total}</div>
                <div class="quiz-score-label">${pct}% correct</div>
                <div class="quiz-score-sub">${msg}</div>
                <button class="btn-retake" onclick="selectQuiz(2)">Try Again</button>
                <button class="btn-try-another" onclick="selectQuiz(0)">Try Another Quiz</button>
            </div>`;
        return;
    }

    const totals = { oily:0, dry:0, combination:0, sensitive:0, normal:0 };
    quizAnswers.forEach(a => { Object.entries(a||{}).forEach(([t,p]) => totals[t]=(totals[t]||0)+p); });
    const result = Object.entries(totals).sort((a,b)=>b[1]-a[1])[0][0];
    const info   = SKIN_INFO[result] || SKIN_INFO.normal;
    const saved  = userProfile?.skinType || "normal";
    const match  = result === saved;

    if (quizIdx === 0) {
        const descs = {
            oily:"Your answers point to excess sebum production. Focus on balance, not stripping.",
            dry:"Your answers indicate compromised moisture retention. Humectants and occlusives are your priority.",
            combination:"You have the classic T-zone/cheek split. Zone-based care works best.",
            sensitive:"Your skin barrier appears reactive. Simplify your routine and patch-test everything.",
            normal:"Your skin appears well-balanced. Consistency and SPF will keep it that way."
        };
        document.getElementById("quizArea").innerHTML = `
            <div class="quiz-score">
                <div style="font-size:48px;margin-bottom:12px">${info.emoji}</div>
                <div class="quiz-score-num" style="font-size:28px">${info.label}</div>
                <div class="quiz-score-sub">${descs[result]}</div>
                ${match
                    ? `<div style="background:#e8f5e9;border-radius:12px;padding:12px 18px;margin-bottom:18px;font-family:'Segoe UI',sans-serif;font-size:14px;color:#2e7d32;font-weight:600">Your result matches your saved GlowMate profile. Your recommendations are accurate.</div>`
                    : `<div style="background:#fff9c4;border-radius:12px;padding:12px 18px;margin-bottom:18px;font-family:'Segoe UI',sans-serif;font-size:14px;color:#7b4f00;font-weight:600">Your result differs from your saved profile (${saved} skin). Consider updating your profile for more accurate recommendations.</div>`
                }
                <button class="btn-retake" onclick="selectQuiz(0)">Retake</button>
                <button class="btn-try-another" onclick="selectQuiz(1)">Try Barrier Quiz</button>
            </div>`;
    } else {
        const bTotals = { damaged:0, compromised:0, healthy:0 };
        quizAnswers.forEach(a => { Object.entries(a||{}).forEach(([t,p]) => bTotals[t]=(bTotals[t]||0)+p); });
        const bResult = Object.entries(bTotals).sort((a,b)=>b[1]-a[1])[0][0];
        const bDesc = {
            healthy: "Your barrier appears intact and functioning well. Focus on maintenance — a consistent gentle routine and daily SPF. Consider introducing preventive actives like vitamin C and retinol.",
            compromised: "Your barrier shows signs of disruption. Prioritise ceramides, panthenol, and glycerin in simple formulations. Reduce active ingredient use temporarily and reintroduce one at a time over 4-6 weeks once baseline comfort is established.",
            damaged: "Your barrier is likely significantly compromised. Strip your routine back to three steps only: a gentle non-foaming cleanser, a ceramide-rich moisturiser, and a mineral SPF. Avoid all actives — including exfoliants, retinoids, and vitamin C — for a minimum of 4-6 weeks to allow barrier regeneration. Humectants on damp skin followed by occlusives are your recovery protocol."
        };
        const bEmoji = { healthy:"✅", compromised:"⚠️", damaged:"🆘" };
        document.getElementById("quizArea").innerHTML = `
            <div class="quiz-score">
                <div style="font-size:48px;margin-bottom:12px">${bEmoji[bResult]}</div>
                <div class="quiz-score-num" style="font-size:24px">${bResult.charAt(0).toUpperCase()+bResult.slice(1)} Barrier</div>
                <div class="quiz-score-sub">${bDesc[bResult]}</div>
                <button class="btn-retake" onclick="selectQuiz(1)">Retake</button>
                <button class="btn-try-another" onclick="selectQuiz(2)">Try Ingredients Quiz</button>
            </div>`;
    }
}
</script>
</body>
</html>
